name: Generate Cricket Player Season Highlights

on:
  workflow_dispatch:
  schedule:
    # Run every day at 08:00 and 20:00 UK time during BST.
    # GitHub cron uses UTC, so these are 07:00 and 19:00 UTC.
    - cron: "15 7,19 * * *"

permissions:
  contents: write

jobs:
  generate-player-season-highlights:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate player season highlights JSON
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: node scripts/generate-cricket-player-season-highlights.mjs

      - name: Commit updated player season highlights JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update cricket player season highlights JSON"
          file_pattern: data/cricket-player-season-highlights.json
