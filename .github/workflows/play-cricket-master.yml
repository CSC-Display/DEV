name: Play-Cricket Master Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Live scores every 10 minutes
    - cron: "*/10 * * * *"

    # Full refreshes at:
    # 7am BST  = 06:00 UTC
    # 6pm BST  = 17:00 UTC
    # 11pm BST = 22:00 UTC
    - cron: "0 6 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"

  workflow_dispatch:

concurrency:
  group: play-cricket-master-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-play-cricket-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      ##########################################################
      # DETERMINE RUN TYPE
      ##########################################################

      - name: Determine refresh type
        id: schedule
        run: |
          CRON="${{ github.event.schedule }}"

          echo "cron=$CRON"

          # Full refresh times
          if [ "$CRON" = "0 6 * * *" ] || \
             [ "$CRON" = "0 17 * * *" ] || \
             [ "$CRON" = "0 22 * * *" ]; then
            echo "run_full=true" >> $GITHUB_OUTPUT
          else
            echo "run_full=false" >> $GITHUB_OUTPUT
          fi

      ##########################################################
      # SAFE NODE EXECUTION WRAPPER
      ##########################################################

      - name: Create retry helper
        run: |
          cat << 'EOF' > retry.sh
          #!/bin/bash
          set -e

          n=0
          until [ $n -ge 3 ]
          do
            "$@" && break
            n=$((n+1))
            echo "Retry $n/3..."
            sleep 5
          done

          if [ $n -ge 3 ]; then
            echo "Command failed after 3 attempts"
            exit 1
          fi
          EOF

          chmod +x retry.sh

      ##########################################################
      # ALWAYS RUN (every 10 mins)
      ##########################################################

      - name: Fetch latest cricket scores
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: ./retry.sh node scripts/fetch-cricket-scores.mjs

      ##########################################################
      # FULL REFRESHES ONLY
      ##########################################################

      - name: Fetch league tables
        if: steps.schedule.outputs.run_full == 'true'
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: ./retry.sh node scripts/fetch-league-tables.mjs

      - name: Fetch latest cricket fixtures
        if: steps.schedule.outputs.run_full == 'true'
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: ./retry.sh node scripts/fetch-cricket-fixtures.mjs

      - name: Fetch club statistics
        if: steps.schedule.outputs.run_full == 'true'
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: ./retry.sh node scripts/fetch-club-statistics.mjs

      - name: Generate player highlights
        if: steps.schedule.outputs.run_full == 'true'
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: ./retry.sh node scripts/generate-cricket-player-season-highlights.mjs

      ##########################################################
      # COMMIT CHANGES
      ##########################################################

      - name: Commit changes (only if needed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Play-Cricket data"

      ##########################################################
      # PUSH CHANGES
      ##########################################################

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin HEAD:main