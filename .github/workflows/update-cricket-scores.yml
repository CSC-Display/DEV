name: Update Play-Cricket scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cricket-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest cricket scores
        run: node scripts/fetch-cricket-scores.mjs
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}

      - name: Commit updated scores JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cricket-scores.json
          git diff --cached --quiet || git commit -m "Update cricket scores"
          git pull --rebase origin main
          git push origin HEAD:main
