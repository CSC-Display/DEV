name: Update Hockey Data

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
 stamp: '18'

      - name: Fetch Hockey Data
        run: node scripts/fetch-hockey-data.mjs

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hockey-data.json
          git status
          git diff-index --quiet HEAD || git commit -m "Automated update of Hockey GMS data"
          git push
