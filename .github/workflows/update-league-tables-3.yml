name: Update Play-Cricket league tables

on:
  schedule:
    - cron: "15 7,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-league-tables:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest league tables
        run: node scripts/fetch-league-tables-3.mjs
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cricket-league-tables-3.json
          git diff --cached --quiet || git commit -m "Update league tables 3"
          git pull --rebase origin main
          git push origin HEAD:main
