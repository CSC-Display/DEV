name: Generate Cricket League Tables

on:
  workflow_dispatch:
  schedule:
    # Run every day at 08:00 and 20:00 UK time during BST.
    # GitHub cron uses UTC, so these are 07:00 and 19:00 UTC.
    - cron: "0 7,13,19 * * *"

permissions:
  contents: write

jobs:
  generate-league-tables:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate league tables JSON
        env:
          PLAY_CRICKET_KEY: ${{ secrets.PLAY_CRICKET_KEY }}
        run: node scripts/fetch-league-tables.mjs

      - name: Commit updated league tables JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update cricket league tables JSON"
          file_pattern: data/cricket-league-tables-all.json
