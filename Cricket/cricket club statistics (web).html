<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford CC – Club Statistics (2026)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --green:#1f6b3a;
    --green-dark:#15512b;
    --green-soft:#e3f2e7;
    --bg:#f2f4f1;
    --card:#ffffff;
    --border:#d8ddd6;
    --muted:#6f786f;
    --ink:#1a1a1a;
    --danger:#b42318;
    --warning:#8a5a00;

    --page-pad: clamp(6px, 0.8vw, 14px);
    --grid-gap: clamp(8px, 0.8vw, 16px);
    --card-min-width: clamp(420px, 42vw, 780px);
    --card-min-height: clamp(420px, 72vh, 920px);

    --header-title: clamp(18px, 1.35vw, 28px);
    --header-small: clamp(11px, 0.8vw, 16px);
    --season-text: clamp(16px, 1.2vw, 26px);
    --updated-text: clamp(10px, 0.7vw, 13px);
    --table-title: clamp(15px, 1.05vw, 22px);
    --table-font: clamp(10px, 0.72vw, 15px);
    --cell-y: clamp(3px, 0.42vh, 7px);
    --cell-x: clamp(3px, 0.30vw, 7px);
    --footer-text: clamp(10px, 0.75vw, 13px);
  }

  *{ box-sizing:border-box; }

  html,
  body{
    height:100vh;
    width:100vw;
    margin:0;
    overflow:hidden;
    background:var(--bg);
    font-family:"Segoe UI", Arial, sans-serif;
    color:var(--ink);
  }

  body{
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  header{
    background:var(--green);
    color:#fff;
    padding:clamp(7px, 0.8vh, 12px) clamp(12px, 1.2vw, 24px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    gap:clamp(8px, 0.8vw, 18px);
    min-height:0;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:clamp(8px, 0.8vw, 16px);
    min-width:0;
  }

  .brand img{
    width:clamp(38px, 3.1vw, 58px);
    height:clamp(38px, 3.1vw, 58px);
    object-fit:contain;
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:clamp(4px, 0.35vw, 6px);
    flex-shrink:0;
  }

  header h1{
    margin:0;
    letter-spacing:clamp(1px, 0.18vw, 4px);
    font-size:var(--header-title);
    line-height:1.05;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .subtitle{
    margin-top:2px;
    font-size:var(--header-small);
    opacity:.9;
    white-space:nowrap;
  }

  .season-block{
    text-align:right;
    flex-shrink:0;
  }

  .season-block .season{
    font-size:var(--season-text);
    letter-spacing:clamp(1px, 0.18vw, 3px);
    font-weight:800;
    white-space:nowrap;
  }

  .season-block .updated{
    margin-top:2px;
    font-size:var(--updated-text);
    opacity:.9;
    white-space:nowrap;
  }

  main{
    flex:1;
    min-height:0;
    padding:var(--page-pad);
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(var(--card-min-width), 1fr));
    grid-auto-rows:minmax(var(--card-min-height), auto);
    gap:var(--grid-gap);
    overflow:auto;
    align-content:start;
  }

  .stats-container{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:var(--card-min-height);
    box-shadow:0 2px 8px rgba(0,0,0,.05);
  }

  .table-header{
    background:var(--green);
    color:#fff;
    padding:clamp(6px, 0.7vh, 10px) clamp(10px, 0.8vw, 16px);
    display:flex;
    justify-content:space-between;
    gap:clamp(8px, 0.8vw, 14px);
    align-items:center;
    font-weight:800;
    font-size:var(--table-title);
    text-transform:uppercase;
    flex-shrink:0;
    line-height:1.1;
  }

  .table-header .label{ flex-shrink:0; }
  .table-header .summary{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:right;
    min-width:0;
    font-size:clamp(10px, 0.75vw, 13px);
    opacity:.9;
  }

  .scroll-area{
    flex:1;
    overflow:auto;
    min-height:0;
  }

  table{
    width:100%;
    min-width:clamp(760px, 50vw, 1040px);
    border-collapse:collapse;
    font-size:var(--table-font);
  }

  th{
    position:sticky;
    top:0;
    background:#f8f9f7;
    text-align:center;
    padding:var(--cell-y) var(--cell-x);
    border-bottom:2px solid var(--border);
    color:var(--muted);
    z-index:2;
    white-space:nowrap;
    font-weight:800;
  }

  td{
    padding:var(--cell-y) var(--cell-x);
    border-bottom:1px solid var(--border);
    white-space:nowrap;
    text-align:center;
    line-height:1.18;
  }

  th:first-child,
  td:first-child{
    width:clamp(30px, 2.1vw, 46px);
  }

  th.player-col,
  td.player-col,
  th.team-col,
  td.team-col{
    text-align:left;
  }

  td.player-col span,
  td.team-col span{
    display:block;
    overflow:visible;
    white-space:normal;
    overflow-wrap:anywhere;
    word-break:normal;
  }

  th.player-col,
  td.player-col{
    min-width:clamp(150px, 13vw, 250px);
    max-width:clamp(200px, 18vw, 340px);
  }

  th.team-col,
  td.team-col{
    min-width:clamp(120px, 10vw, 210px);
    max-width:clamp(160px, 15vw, 280px);
  }

  .bold{ font-weight:800; }

  .message{
    grid-column:1 / -1;
    background:#fff;
    border:2px solid var(--border);
    border-radius:14px;
    padding:20px;
    text-align:center;
    font-size:clamp(13px, 0.9vw, 16px);
  }

  .message.error{
    color:var(--danger);
    border-color:#f0b8b2;
    background:#fff7f6;
  }

  .skeleton-box{
    background:#eee;
    height:20px;
    margin:10px;
    border-radius:4px;
    animation:pulse 1.5s infinite;
  }

  @keyframes pulse{
    0%{ opacity:1; }
    50%{ opacity:.5; }
    100%{ opacity:1; }
  }

  footer{
    background:var(--green-dark);
    color:#fff;
    min-height:clamp(28px, 3.3vh, 42px);
    padding:clamp(4px, 0.45vh, 7px) clamp(10px, 1vw, 16px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:var(--footer-text);
    flex-shrink:0;
  }

  footer span:last-child{ text-align:right; }

  @media (min-width:1700px) and (min-height:900px){
    :root{
      --card-min-width:620px;
      --card-min-height:calc(100vh - 92px - 38px - (2 * var(--page-pad)));
    }

    main{
      grid-template-columns:repeat(2, minmax(0, 1fr));
      grid-auto-rows:minmax(var(--card-min-height), auto);
      overflow:hidden;
    }
  }

  @media (max-width:1200px){
    :root{
      --card-min-width:420px;
      --card-min-height:420px;
    }
  }

  @media (max-width:700px){
    html,
    body{
      overflow:auto;
      height:auto;
      min-height:100vh;
    }

    body{ min-height:100vh; }

    header{
      align-items:flex-start;
      flex-direction:column;
    }

    header h1,
    .subtitle,
    .season-block .season,
    .season-block .updated{
      white-space:normal;
    }

    .season-block{ text-align:left; }

    main{
      grid-template-columns:1fr;
      grid-auto-rows:minmax(360px, auto);
      overflow:visible;
    }

    .stats-container{ min-height:360px; }

    table{ min-width:760px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&h=180&w=180&t=square" alt="Chelmsford Cricket Club logo" />
    <div>
      <h1>Club Statistics</h1>
      <div class="subtitle">Chelmsford Cricket Club</div>
    </div>
  </div>
  <div class="season-block">
    <div class="season">SEASON 2026</div>
    <div class="updated" id="last-updated">Loading latest statistics…</div>
  </div>
</header>

<main id="stats-grid" aria-live="polite"></main>

<footer>
  <span>Data generated from Play-Cricket via GitHub Actions</span>
  <span id="footer-clock"></span>
</footer>

<script>
const DATA_URL = "../data/cricket-club-statistics.json";
const REFRESH_MS = 5 * 60 * 1000;

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function updateClock(){
  const el = document.getElementById("footer-clock");
  if(!el) return;
  el.textContent = new Date().toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

function fmt(value, decimals = null){
  if(value === null || value === undefined || value === "") return "—";
  if(typeof value === "number" && Number.isFinite(value)){
    return decimals === null ? String(value) : value.toFixed(decimals);
  }
  return String(value);
}

function buildBattingTable(rows){
  const body = (rows || []).map((r, index) => `
    <tr>
      <td class="bold">${index + 1}</td>
      <td class="player-col bold"><span title="${escapeHtml(r.player)}">${escapeHtml(r.player)}</span></td>
      <td class="team-col"><span title="${escapeHtml(r.teams)}">${escapeHtml(r.teams)}</span></td>
      <td>${fmt(r.innings)}</td>
      <td>${fmt(r.not_outs)}</td>
      <td class="bold">${fmt(r.runs)}</td>
      <td>${escapeHtml(r.high_score_display || "—")}</td>
      <td>${fmt(r.average, 2)}</td>
      <td>${fmt(r.strike_rate, 1)}</td>
      <td>${fmt(r.fifties)}</td>
      <td>${fmt(r.hundreds)}</td>
    </tr>`).join("");

  return `
    <section class="stats-container">
      <div class="table-header">
        <span class="label">Batting</span>
        <span class="summary">Top 20 by runs</span>
      </div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th class="player-col">Player</th>
              <th class="team-col">Teams</th>
              <th>Inns</th>
              <th>NO</th>
              <th>Runs</th>
              <th>HS</th>
              <th>Avg</th>
              <th>SR</th>
              <th>50s</th>
              <th>100s</th>
            </tr>
          </thead>
          <tbody>${body || `<tr><td colspan="11">No batting statistics found.</td></tr>`}</tbody>
        </table>
      </div>
    </section>`;
}

function buildBowlingTable(rows){
  const body = (rows || []).map((r, index) => `
    <tr>
      <td class="bold">${index + 1}</td>
      <td class="player-col bold"><span title="${escapeHtml(r.player)}">${escapeHtml(r.player)}</span></td>
      <td class="team-col"><span title="${escapeHtml(r.teams)}">${escapeHtml(r.teams)}</span></td>
      <td>${fmt(r.innings)}</td>
      <td>${fmt(r.overs, 1)}</td>
      <td>${fmt(r.maidens)}</td>
      <td>${fmt(r.runs)}</td>
      <td class="bold">${fmt(r.wickets)}</td>
      <td>${escapeHtml(r.best || "—")}</td>
      <td>${fmt(r.average, 2)}</td>
      <td>${fmt(r.economy, 2)}</td>
      <td>${fmt(r.strike_rate, 1)}</td>
      <td>${fmt(r.three_wickets)}</td>
      <td>${fmt(r.five_wickets)}</td>
    </tr>`).join("");

  return `
    <section class="stats-container">
      <div class="table-header">
        <span class="label">Bowling</span>
        <span class="summary">Top 20 by wickets</span>
      </div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th class="player-col">Player</th>
              <th class="team-col">Teams</th>
              <th>Inns</th>
              <th>Overs</th>
              <th>M</th>
              <th>Runs</th>
              <th>Wkts</th>
              <th>BB</th>
              <th>Avg</th>
              <th>Econ</th>
              <th>SR</th>
              <th>3w</th>
              <th>5w</th>
            </tr>
          </thead>
          <tbody>${body || `<tr><td colspan="14">No bowling statistics found.</td></tr>`}</tbody>
        </table>
      </div>
    </section>`;
}

function setLoadingState(){
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = `
    <section class="stats-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>
    <section class="stats-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>`;
}

function setErrorState(message){
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
}

async function loadStats(){
  const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache:"no-store" });

  if(!response.ok){
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${response.status}.`);
  }

  return await response.json();
}

async function renderStats({showLoading = false} = {}){
  const updatedEl = document.getElementById("last-updated");

  if(showLoading) setLoadingState();

  try{
    const data = await loadStats();
    document.getElementById("stats-grid").innerHTML =
      buildBattingTable(data.batting || []) + buildBowlingTable(data.bowling || []);

    updatedEl.textContent = data.generated_at
      ? `Last updated: ${formatDateTime(data.generated_at)}`
      : "Last updated time not supplied";

  }catch(err){
    console.error(err);
    setErrorState(`Club statistics could not be loaded. Check that ${DATA_URL} exists and is valid JSON.`);
    updatedEl.textContent = "Statistics failed to load";
  }
}

updateClock();
setInterval(updateClock, 1000);
renderStats({showLoading:true});
setInterval(() => renderStats(), REFRESH_MS);
</script>
</body>
</html>
