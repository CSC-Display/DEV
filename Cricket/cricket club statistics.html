<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford CC – Club Statistics (2026)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --green:#1f6b3a;
    --green-dark:#15512b;
    --green-soft:#e3f2e7;
    --bg:#f2f4f1;
    --card:#ffffff;
    --border:#d8ddd6;
    --muted:#5f6a5f;
    --ink:#101510;
    --danger:#b42318;

    --header-h: 70px;
    --footer-h: 30px;
    --page-pad: 10px;
    --grid-gap: 12px;
    --table-font: 12px;
    --cell-y: 3px;
    --cell-x: 4px;
  }

  *{ box-sizing:border-box; }

  html,
  body{
    height:100vh;
    width:100vw;
    margin:0;
    overflow:hidden;
    background:var(--bg);
    font-family:"Segoe UI", Arial, sans-serif;
    color:var(--ink);
  }

  body{
    display:flex;
    flex-direction:column;
  }

  header{
    height:var(--header-h);
    background:var(--green);
    color:#fff;
    padding:8px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    gap:16px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }

  .brand img{
    width:52px;
    height:52px;
    object-fit:contain;
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:5px;
    flex-shrink:0;
  }

  header h1{
    margin:0;
    letter-spacing:4px;
    font-size:28px;
    line-height:1;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .subtitle{
    margin-top:4px;
    font-size:14px;
    opacity:.95;
    white-space:nowrap;
  }

  .season-block{
    text-align:right;
    flex-shrink:0;
  }

  .season-block .season{
    font-size:24px;
    letter-spacing:4px;
    font-weight:900;
    white-space:nowrap;
    line-height:1;
  }

  .season-block .updated{
    margin-top:7px;
    font-size:12px;
    opacity:.95;
    white-space:nowrap;
  }

  main{
    height:calc(100vh - var(--header-h) - var(--footer-h));
    padding:var(--page-pad);
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:var(--grid-gap);
    overflow:hidden;
    min-height:0;
  }

  .stats-container{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;
    min-height:0;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }

  .table-header{
    height:34px;
    background:var(--green);
    color:#fff;
    padding:5px 14px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:center;
    font-weight:900;
    font-size:24px;
    text-transform:uppercase;
    flex-shrink:0;
    line-height:1;
  }

  .table-header .label{ flex-shrink:0; }

  .table-header .summary{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:right;
    min-width:0;
    font-size:24px;
    letter-spacing:.5px;
    opacity:.95;
  }

  .scroll-area{
    flex:1;
    min-height:0;
    overflow:hidden; /* deliberate: no scrollbars on the 1920x1080 TV layout */
  }

  table{
    width:100%;
    height:auto;
    table-layout:fixed;
    border-collapse:collapse;
    font-size:var(--table-font);
  }

  th{
    background:#f8f9f7;
    text-align:center;
    padding:4px var(--cell-x);
    border-bottom:2px solid var(--border);
    color:var(--muted);
    white-space:nowrap;
    font-weight:900;
    line-height:1.05;
  }

  td{
    padding:var(--cell-y) var(--cell-x);
    border-bottom:1px solid var(--border);
    white-space:nowrap;
    text-align:center;
    line-height:1.08;
    height:22px;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  td.player-col,
  td.team-col,
  th.player-col,
  th.team-col{
    text-align:left;
  }

  td.player-col span,
  td.team-col span{
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .bold{ font-weight:900; }

  /* Batting column widths: player column deliberately reduced; team column protected */
  .batting-table th:nth-child(1), .batting-table td:nth-child(1){ width:4%; }
  .batting-table th:nth-child(2), .batting-table td:nth-child(2){ width:22%; }
  .batting-table th:nth-child(3), .batting-table td:nth-child(3){ width:32%; }
  .batting-table th:nth-child(4), .batting-table td:nth-child(4){ width:5%; }
  .batting-table th:nth-child(5), .batting-table td:nth-child(5){ width:4%; }
  .batting-table th:nth-child(6), .batting-table td:nth-child(6){ width:6%; }
  .batting-table th:nth-child(7), .batting-table td:nth-child(7){ width:5%; }
  .batting-table th:nth-child(8), .batting-table td:nth-child(8){ width:6%; }
  .batting-table th:nth-child(9), .batting-table td:nth-child(9){ width:6%; }
  .batting-table th:nth-child(10), .batting-table td:nth-child(10){ width:5%; }
  .batting-table th:nth-child(11), .batting-table td:nth-child(11){ width:5%; }

  /* Bowling has more columns, so player is smaller and team gets enough room */
  .bowling-table{ font-size:11.5px; }
  .bowling-table th:nth-child(1), .bowling-table td:nth-child(1){ width:4%; }
  .bowling-table th:nth-child(2), .bowling-table td:nth-child(2){ width:17%; }
  .bowling-table th:nth-child(3), .bowling-table td:nth-child(3){ width:25%; }
  .bowling-table th:nth-child(4), .bowling-table td:nth-child(4){ width:4.5%; }
  .bowling-table th:nth-child(5), .bowling-table td:nth-child(5){ width:6%; }
  .bowling-table th:nth-child(6), .bowling-table td:nth-child(6){ width:3.5%; }
  .bowling-table th:nth-child(7), .bowling-table td:nth-child(7){ width:5%; }
  .bowling-table th:nth-child(8), .bowling-table td:nth-child(8){ width:5%; }
  .bowling-table th:nth-child(9), .bowling-table td:nth-child(9){ width:6%; }
  .bowling-table th:nth-child(10), .bowling-table td:nth-child(10){ width:5.5%; }
  .bowling-table th:nth-child(11), .bowling-table td:nth-child(11){ width:5.5%; }
  .bowling-table th:nth-child(12), .bowling-table td:nth-child(12){ width:5%; }
  .bowling-table th:nth-child(13), .bowling-table td:nth-child(13){ width:4%; }
  .bowling-table th:nth-child(14), .bowling-table td:nth-child(14){ width:4%; }

  .message{
    grid-column:1 / -1;
    background:#fff;
    border:2px solid var(--border);
    border-radius:14px;
    padding:20px;
    text-align:center;
    font-size:15px;
  }

  .message.error{
    color:var(--danger);
    border-color:#f0b8b2;
    background:#fff7f6;
  }

  .skeleton-box{
    background:#eee;
    height:20px;
    margin:10px;
    border-radius:4px;
    animation:pulse 1.5s infinite;
  }

  @keyframes pulse{
    0%{ opacity:1; }
    50%{ opacity:.5; }
    100%{ opacity:1; }
  }

  footer{
    height:var(--footer-h);
    background:var(--green-dark);
    color:#fff;
    padding:4px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:12px;
    flex-shrink:0;
  }

  footer span:last-child{ text-align:right; }

  @media (max-width:1500px){
    html, body{ overflow:auto; height:auto; min-height:100vh; }
    body{ min-height:100vh; }
    main{
      height:auto;
      grid-template-columns:1fr;
      overflow:visible;
    }
    .stats-container{ min-height:520px; }
    .scroll-area{ overflow:auto; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&h=180&w=180&t=square" alt="Chelmsford Cricket Club logo" />
    <div>
      <h1>Club Statistics</h1>
      <div class="subtitle">Chelmsford Cricket Club</div>
    </div>
  </div>
  <div class="season-block">
    <div class="season">SEASON 2026</div>
    <div class="updated" id="last-updated">Loading latest statistics…</div>
  </div>
</header>

<main id="stats-grid" aria-live="polite"></main>

<footer>
  <span>Data generated from Play-Cricket via GitHub Actions</span>
  <span id="footer-clock"></span>
</footer>

<script>
const DATA_URL = "../data/cricket-club-statistics.json";
const REFRESH_MS = 5 * 60 * 1000;

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function updateClock(){
  const el = document.getElementById("footer-clock");
  if(!el) return;
  el.textContent = new Date().toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

function fmt(value, decimals = null){
  if(value === null || value === undefined || value === "") return "—";
  if(typeof value === "number" && Number.isFinite(value)){
    return decimals === null ? String(value) : value.toFixed(decimals);
  }
  return String(value);
}

function buildBattingTable(rows){
  const body = (rows || []).map((r, index) => `
    <tr>
      <td class="bold">${index + 1}</td>
      <td class="player-col bold"><span title="${escapeHtml(r.player)}">${escapeHtml(r.player)}</span></td>
      <td class="team-col"><span title="${escapeHtml(r.teams)}">${escapeHtml(r.teams)}</span></td>
      <td>${fmt(r.innings)}</td>
      <td>${fmt(r.not_outs)}</td>
      <td class="bold">${fmt(r.runs)}</td>
      <td>${escapeHtml(r.high_score_display || "—")}</td>
      <td>${fmt(r.average, 2)}</td>
      <td>${fmt(r.strike_rate, 1)}</td>
      <td>${fmt(r.fifties)}</td>
      <td>${fmt(r.hundreds)}</td>
    </tr>`).join("");

  return `
    <section class="stats-container batting-panel">
      <div class="table-header">
        <span class="label">Batting</span>
        <span class="summary">Top 20 by runs</span>
      </div>
      <div class="scroll-area">
        <table class="batting-table">
          <thead>
            <tr>
              <th>Pos</th>
              <th class="player-col">Player</th>
              <th class="team-col">Teams</th>
              <th>Inns</th>
              <th>NO</th>
              <th>Runs</th>
              <th>HS</th>
              <th>Avg</th>
              <th>SR</th>
              <th>50s</th>
              <th>100s</th>
            </tr>
          </thead>
          <tbody>${body || `<tr><td colspan="11">No batting statistics found.</td></tr>`}</tbody>
        </table>
      </div>
    </section>`;
}

function buildBowlingTable(rows){
  const body = (rows || []).map((r, index) => `
    <tr>
      <td class="bold">${index + 1}</td>
      <td class="player-col bold"><span title="${escapeHtml(r.player)}">${escapeHtml(r.player)}</span></td>
      <td class="team-col"><span title="${escapeHtml(r.teams)}">${escapeHtml(r.teams)}</span></td>
      <td>${fmt(r.innings)}</td>
      <td>${fmt(r.overs, 1)}</td>
      <td>${fmt(r.maidens)}</td>
      <td>${fmt(r.runs)}</td>
      <td class="bold">${fmt(r.wickets)}</td>
      <td>${escapeHtml(r.best || "—")}</td>
      <td>${fmt(r.average, 2)}</td>
      <td>${fmt(r.economy, 2)}</td>
      <td>${fmt(r.strike_rate, 1)}</td>
      <td>${fmt(r.three_wickets)}</td>
      <td>${fmt(r.five_wickets)}</td>
    </tr>`).join("");

  return `
    <section class="stats-container bowling-panel">
      <div class="table-header">
        <span class="label">Bowling</span>
        <span class="summary">Top 20 by wickets</span>
      </div>
      <div class="scroll-area">
        <table class="bowling-table">
          <thead>
            <tr>
              <th>Pos</th>
              <th class="player-col">Player</th>
              <th class="team-col">Teams</th>
              <th>Inns</th>
              <th>Overs</th>
              <th>M</th>
              <th>Runs</th>
              <th>Wkts</th>
              <th>BB</th>
              <th>Avg</th>
              <th>Econ</th>
              <th>SR</th>
              <th>3w</th>
              <th>5w</th>
            </tr>
          </thead>
          <tbody>${body || `<tr><td colspan="14">No bowling statistics found.</td></tr>`}</tbody>
        </table>
      </div>
    </section>`;
}

function setLoadingState(){
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = `
    <section class="stats-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>
    <section class="stats-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>`;
}

function setErrorState(message){
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
}

async function loadStats(){
  const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache:"no-store" });

  if(!response.ok){
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${response.status}.`);
  }

  return await response.json();
}

async function renderStats({showLoading = false} = {}){
  const updatedEl = document.getElementById("last-updated");

  if(showLoading) setLoadingState();

  try{
    const data = await loadStats();
    document.getElementById("stats-grid").innerHTML =
      buildBattingTable(data.batting || []) + buildBowlingTable(data.bowling || []);

    updatedEl.textContent = data.generated_at
      ? `Last updated: ${formatDateTime(data.generated_at)}`
      : "Last updated time not supplied";

  }catch(err){
    console.error(err);
    setErrorState(`Club statistics could not be loaded. Check that ${DATA_URL} exists and is valid JSON.`);
    updatedEl.textContent = "Statistics failed to load";
  }
}

updateClock();
setInterval(updateClock, 1000);
renderStats({showLoading:true});
setInterval(() => renderStats(), REFRESH_MS);
</script>
</body>
</html>
