<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chelmsford CC – Forthcoming Fixtures (2026)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --green:#1f6b3a;
      --green-dark:#16522c;
      --league-bg:#e3f2e7; /* home at Chelmer Park */
      --cup-text:#ff3300;
      --friendly-text:#0057b8;
      --bg:#f2f4f1;
      --card:#ffffff;
      --border:#d8ddd6;
      --muted:#7f887f;
      --ink:#1a1a1a;

      /* Measured in JS; fallbacks are deliberately compact */
      --header-h: clamp(58px, 7vh, 84px);
      --footer-h: clamp(30px, 3.8vh, 48px);

      /* Autoscaling layout controls */
      --page-pad: clamp(6px, 0.8vw, 14px);
      --grid-gap: clamp(6px, 0.7vw, 14px);
      --card-min-width: clamp(280px, 18vw, 380px);
      --card-min-height: clamp(210px, 40vh, 390px);

      /* Autoscaling type controls */
      --header-title: clamp(18px, 1.35vw, 28px);
      --header-small: clamp(11px, 0.8vw, 16px);
      --card-header: clamp(15px, 1.05vw, 22px);
      --fixture-main: clamp(13px, 0.95vw, 18px);
      --fixture-sub: clamp(11px, 0.78vw, 15px);
      --footer-text: clamp(10px, 0.75vw, 13px);
    }

    *{ box-sizing:border-box; }

    html,
    body{
      height:100vh;
      width:100vw;
      margin:0;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family:"Segoe UI", system-ui, sans-serif;
      color:var(--ink);
    }

    /* ---------- HEADER: fixed, but scales with screen size ---------- */
    header{
      background:var(--green);
      color:#fff;
      padding:clamp(7px, 0.8vh, 12px) clamp(12px, 1.2vw, 24px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:clamp(8px, 0.8vw, 16px);
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      min-height:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:clamp(8px, 0.8vw, 16px);
      min-width:0;
    }

    .brand img{
      width:clamp(38px, 3.1vw, 58px);
      height:clamp(38px, 3.1vw, 58px);
      object-fit:contain;
      background:rgba(255,255,255,.12);
      border-radius:12px;
      padding:clamp(4px, 0.35vw, 6px);
      flex-shrink:0;
    }

    header h1{
      margin:0;
      letter-spacing:clamp(1px, 0.18vw, 4px);
      font-size:var(--header-title);
      line-height:1.05;
      white-space:nowrap;
      text-transform:uppercase;
    }

    header .small{
      font-size:var(--header-small);
      color:#fff;
      white-space:nowrap;
      margin-top:2px;
    }

    /* ---------- MAIN: auto-fit cards; scrolls rather than compressing ---------- */
    main{
      position:fixed;
      top:var(--header-h);
      bottom:var(--footer-h);
      left:0;
      right:0;
      overflow:auto;
      padding:var(--page-pad);
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(var(--card-min-width), 1fr));
      grid-auto-rows:minmax(var(--card-min-height), auto);
      gap:var(--grid-gap);
      align-content:start;
    }

    .match{
      border:2px solid var(--border);
      border-radius:14px;
      background:var(--card);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:var(--card-min-height);
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }

    .match-header{
      padding:clamp(6px, 0.7vh, 10px) clamp(8px, 0.7vw, 12px);
      background:var(--green);
      color:#fff;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      flex-shrink:0;
      min-height:clamp(34px, 4vh, 48px);
      display:flex;
      align-items:center;
      font-size:var(--card-header);
      line-height:1.1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .fixtures-list{
      min-height:0;
      overflow:auto; /* never hides fixture rows on smaller displays */
      display:flex;
      flex-direction:column;
      flex:1;
    }

    .fixture-row{
      padding:clamp(5px, 0.55vh, 8px) clamp(8px, 0.7vw, 12px);
      border-bottom:1px solid var(--border);
      font-size:var(--fixture-main);
      line-height:1.15;
      overflow:visible;
      flex-shrink:0;
      background:#fff; /* away/default fixtures */
      color:var(--ink);
    }

    .fixture-row:last-child{ border-bottom:none; }

    .fixture-line-1{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:clamp(6px, 0.6vw, 10px);
      margin-bottom:2px;
      font-weight:800; /* date and opposition bold */
      flex-wrap:wrap;
    }

    .fixture-line-2{
      font-size:var(--fixture-sub);
      color:inherit;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:clamp(6px, 0.6vw, 10px);
      font-weight:400; /* location and league not bold */
      flex-wrap:wrap;
    }

    .fixture-line-1 span,
    .fixture-line-2 span{
      min-width:0;
      overflow-wrap:anywhere;
      word-break:normal;
      white-space:normal;
    }

    .fixture-line-1 span:first-child,
    .fixture-line-2 span:first-child{
      flex:1 1 42%;
    }

    .fixture-line-1 span:last-child,
    .fixture-line-2 span:last-child{
      flex:1 1 52%;
      text-align:right;
    }

    /* Fixture formatting logic */
    .fixture-row.is-chelmer{ background-color:var(--league-bg); } /* home at Chelmer Park */
    .fixture-row.is-cup{ color:var(--cup-text); }                 /* cup match text */
    .fixture-row.is-friendly{ color:var(--friendly-text); }       /* friendly match text */

    .muted{
      color:var(--muted);
      font-weight:600;
      font-size:var(--fixture-main);
      overflow-wrap:anywhere;
    }

    /* ---------- FOOTER: fixed and compact, scales slightly ---------- */
    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:var(--footer-h);
      background:#eef2ec;
      border-top:2px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 clamp(10px, 1vw, 18px);
      font-size:var(--footer-text);
      color:#4a514a;
      z-index:50;
      gap:8px;
    }

    .footer .left{
      display:flex;
      gap:clamp(6px, 0.6vw, 10px);
      align-items:center;
      min-width:0;
      overflow:hidden;
    }

    .small_footer{
      font-size:clamp(10px, 0.7vw, 12px);
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pill{
      background:#fff;
      border:1px solid var(--border);
      padding:clamp(3px, 0.4vh, 6px) clamp(7px, 0.6vw, 10px);
      border-radius:999px;
      font-size:var(--footer-text);
      white-space:nowrap;
    }

    .skeleton{
      background:linear-gradient(90deg, #f1f3f0, #e7ebe6, #f1f3f0);
      background-size:200% 100%;
      animation:shimmer 1.1s infinite;
      border-radius:10px;
      height:14px;
      width:70%;
    }

    @keyframes shimmer{
      0%{ background-position:200% 0; }
      100%{ background-position:-200% 0; }
    }

    /* Large landscape screens: keep a dashboard-style 5x2 layout where it fits */
    @media (min-width:1700px) and (min-height:900px){
      :root{
        --card-min-width:320px;
        --card-min-height:calc((100vh - var(--header-h) - var(--footer-h) - (2 * var(--page-pad)) - var(--grid-gap)) / 2);
      }
      main{
        grid-template-columns:repeat(5, minmax(0, 1fr));
        grid-auto-rows:minmax(var(--card-min-height), auto);
      }
    }

    /* Medium screens: fewer columns, bigger boxes, page scrolls */
    @media (max-width:1400px){
      :root{
        --card-min-width:300px;
        --card-min-height:230px;
      }
      main{
        grid-template-columns:repeat(auto-fit, minmax(var(--card-min-width), 1fr));
      }
    }

    /* Small screens: single column, natural document scrolling */
    @media (max-width:700px){
      html, body{
        overflow:auto;
        height:auto;
        min-height:100vh;
      }

      header{
        align-items:flex-start;
        flex-direction:column;
        position:relative;
      }

      header h1{
        white-space:normal;
      }

      .footer{
        position:relative;
        height:auto;
        min-height:var(--footer-h);
        flex-wrap:wrap;
        padding:6px 10px;
      }

      main{
        position:relative;
        top:auto;
        bottom:auto;
        display:grid;
        grid-template-columns:1fr;
        grid-auto-rows:minmax(230px, auto);
        overflow:visible;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&bg=null&h=180&w=180&t=square&q=null" alt="Chelmsford Cricket Club badge" />
    <div>
      <h1>FORTHCOMING FIXTURES</h1>
      <div class="small">Chelmsford Cricket Club</div>
    </div>
  </div>
  <h1>SEASON 2026</h1>
</header>

<main id="grid"></main>

<footer class="footer">
  <div class="left">
    <span class="pill">Refresh in <strong id="countdown">300</strong>s</span>
    <span class="small_footer" id="lastRefreshed">Last refreshed: —</span>
  </div>
  <div class="right">
    <span class="pill" id="clock">—</span>
  </div>
</footer>

<script>
// ------------------------
// Layout sync
// Measures actual header/footer heights and sets CSS vars so main sits correctly.
// ------------------------
function syncFixedLayoutHeights(){
  const h = document.querySelector("header");
  const f = document.querySelector("footer.footer");
  if (h) document.documentElement.style.setProperty("--header-h", h.offsetHeight + "px");
  if (f) document.documentElement.style.setProperty("--footer-h", f.offsetHeight + "px");
}
window.addEventListener("resize", syncFixedLayoutHeights);
window.addEventListener("load", syncFixedLayoutHeights);

const DATA_URL = "../data/cricket-fixtures.json";

const TEAMS = [
  { name:"Sat 1st XI", id:24293 },
  { name:"Sat 2nd XI", id:24294 },
  { name:"Sat 3rd XI", id:24295 },
  { name:"Sat 4th XI", id:30461 },
  { name:"Sat 5th XI", id:45348 },
  { name:"Sat 6th XI", id:105976 },
  { name:"NECL 1st XI", id:324716 },
  { name:"Sun 1st XI", id:30938 },
  { name:"Twenty20", id:133549 },
  { name:"Womens 1st XI", id:213007 }
];

const REFRESH_SECONDS = 300;

function pad2(n){ return String(n).padStart(2, "0"); }

function nowLocalString(){
  const d = new Date();
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function stripChelmsford(n){
  return String(n || "")
    .replace(/^\s*Chelmsford\s+(?:CC|Cricket\s+Club)?\s*/i, "")
    .trim();
}

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[ch]));
}

function renderSkeletonCard(teamName){
  return `
    <div class="match">
      <div class="match-header">${escapeHtml(teamName)}</div>
      <div class="fixtures-list">
        <div class="fixture-row"><div class="skeleton"></div></div>
        <div class="fixture-row"><div class="skeleton" style="width:90%"></div></div>
      </div>
    </div>`;
}

function renderCard(team, fixtures) {
  const fixtureHtml = (fixtures || []).map(f => {
    const isChelmsfordHome = String(f.home_club_id) === "1786";
    const oppName = isChelmsfordHome ? f.away_club_name : f.home_club_name;
    const ground = f.ground_name || "TBC";
    const compType = (f.competition_type || "").toLowerCase();
    const compName = f.competition_name || "Friendly";
    const isChelmer = ground.includes("Chelmer Park");
    const isCup = compType === "cup" || compName.toLowerCase().includes("cup");
    const isFriendly = compType === "friendly" || compName.toLowerCase().includes("friendly");
    const rowClass = [
      "fixture-row",
      isChelmer ? "is-chelmer" : "",
      isCup ? "is-cup" : "",
      isFriendly ? "is-friendly" : ""
    ].filter(Boolean).join(" ");

    return `
      <div class="${rowClass}">
        <div class="fixture-line-1">
          <span title="${escapeHtml(f.match_date)}">${escapeHtml(f.match_date)}</span>
          <span title="${escapeHtml(stripChelmsford(oppName))}">${escapeHtml(stripChelmsford(oppName))}</span>
        </div>
        <div class="fixture-line-2">
          <span title="${escapeHtml(ground)}">${escapeHtml(ground)}</span>
          <span title="${escapeHtml(compName)}">${escapeHtml(compName)}</span>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="match">
      <div class="match-header">${escapeHtml(team.name)}</div>
      <div class="fixtures-list">
        ${fixtureHtml || '<div class="fixture-row muted">No upcoming fixtures</div>'}
      </div>
    </div>`;
}

async function loadFixturesData() {
  const res = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
  if (!res.ok) {
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${res.status}`);
  }
  return await res.json();
}

async function loadAndRender() {
  const grid = document.getElementById("grid");
  grid.innerHTML = TEAMS.map(t => renderSkeletonCard(t.name)).join("");

  try {
    const data = await loadFixturesData();
    grid.innerHTML = data.map(d => renderCard(d.team, d.fix)).join("");
  } catch (e) {
    console.error(e);
    grid.innerHTML = TEAMS.map(t => `
      <div class="match">
        <div class="match-header">${escapeHtml(t.name)}</div>
        <div class="fixtures-list">
          <div class="fixture-row muted">Could not load fixtures JSON</div>
        </div>
      </div>`).join("");
  }

  const lastEl = document.getElementById("lastRefreshed");
  if (lastEl) lastEl.textContent = `Last refreshed: ${nowLocalString()}`;
  setTimeout(syncFixedLayoutHeights, 50);
}

let cd = REFRESH_SECONDS;
setInterval(() => {
  document.getElementById("clock").textContent = nowLocalString();
  if (--cd < 0) {
    cd = REFRESH_SECONDS;
    loadAndRender();
  }
  document.getElementById("countdown").textContent = cd;
}, 1000);

syncFixedLayoutHeights();
document.getElementById("clock").textContent = nowLocalString();
loadAndRender();
</script>
</body>
</html>
