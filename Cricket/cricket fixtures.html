<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<title>Chelmsford CC – Forthcoming Fixtures (2026)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root{
  --green:#1f6b3a;
  --league-bg:#e3f2e7; /* light green[cite: 1] */
  --cup-bg:#f3c6c6;    /* light red[cite: 1] */
  --bg:#f2f4f1;
  --card:#ffffff;
  --border:#d8ddd6;
  --muted:#7f887f;
  --ink:#1a1a1a;
}

*{box-sizing:border-box}

main {
  flex: 1;
  overflow-y: auto;
}

body {
  display: flex;
  flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif;
  color: var(--ink);
}

header{
  background:var(--green);
  color:white;
  padding:14px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand img{
  width:56px;
  height:56px;
  object-fit:contain;
  background: rgba(255,255,255,.12);
  border-radius:12px;
  padding:6px;
}

header h1{
  margin:0;
  letter-spacing:4px;
  font-size:26px;
  line-height:1.05;
}

main {
  flex: 1;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 12px;
}

@media (max-width:1400px){ main{grid-template-columns: repeat(3,1fr);} }
@media (max-width:900px){ main{grid-template-columns: repeat(1,1fr);} }

.match {
  border: 2px solid var(--border);
  border-radius: 14px;
  background: var(--card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.match-header{
  padding:10px 12px;
  background: var(--green);
  color: #fff;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.fixture-row {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.fixture-row:last-child { border-bottom: none; }

.fixture-line-1 {
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}

.fixture-line-2 {
  font-size: 11px;
  color: #555;
  display: flex;
  justify-content: space-between;
}

/* Background Logic[cite: 1] */
.bg-league { background-color: var(--league-bg); }
.bg-cup { background-color: var(--cup-bg); }

/* Ground Highlight Logic */
.is-chelmer { font-weight: 800; }

.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:56px;
  background:#eef2ec;
  border-top:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  font-size:14px;
  color:#4a514a;
}

.footer .left{
  display:flex;
  gap:10px;
  align-items:center;
}

.small_footer{
  font-size:12px;
  color: var(--muted);
}

.pill{
  background:white;
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
}

</style>

<body>

<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&bg=null&h=180&w=180&t=square&q=null" alt="Logo" />
    <div>
      <h1>FORTHCOMING FIXTURES</h1>
      <div style="font-size:16px">Chelmsford Cricket Club</div>
    </div>
  </div>
  <h1>SEASON 2026</h1>
</header>

<main id="grid"></main>

<footer class="footer">
  <div class="left">
    <span class="pill">Refresh in <strong id="countdown">300</strong>s</span>
    <span class="small_footer" id="lastRefreshed">Last refreshed: —</span>
  </div>
  <div class="right">
    <span class="pill" id="clock">—</span>
  </div>
</footer>

<script>
const SITE_ID = 1786;
const SEASON = "2026";
const API_TOKEN = "8786d7c44061b7d624367d32177420e0"; 

const TEAMS = [
  { name:"Sat 1st XI", id:24293 },
  { name:"Sat 2nd XI", id:24294 },
  { name:"Sat 3rd XI", id:24295 },
  { name:"Sat 4th XI", id:30461 },
  { name:"Sat 5th XI", id:45348 },
  { name:"Sat 6th XI", id:105976 },
  { name:"NECL 1st XI", id:324716 },
  { name:"Sun 1st XI", id:30938 },
  { name:"Twenty20", id:133549 },
  { name:"Womens 1st XI", id:213007 }
];

function stripChelmsford(n){ return n.replace(/Chelmsford\s(CC|Cricket\sClub)\s/gi, "").trim(); }

async function fetchFixtures(teamId) {
  const url = `https://play-cricket.com/api/v2/matches.json?site_id=${SITE_ID}&season=${SEASON}&team_id=${teamId}&api_token=${API_TOKEN}`;
  
  // Set "tomorrow" at start of day for accurate comparison
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);

  try {
    const res = await fetch(url);
    const json = await res.json();
    
    return (json.matches || [])
      .filter(m => {
        // Only include fixtures without results
        if (m.result) return false;
        
        // Convert dd/mm/yyyy to a comparable date object
        const parts = m.match_date.split('/');
        const matchDate = new Date(parts[2], parts[1] - 1, parts[0]);
        
        // Only include fixtures from tomorrow onwards
        return matchDate >= tomorrow;
      })
      .sort((a, b) => {
        const dateA = new Date(a.match_date.split('/').reverse().join('-'));
        const dateB = new Date(b.match_date.split('/').reverse().join('-'));
        return dateA - dateB;
      })
      .slice(0, 4); // Limit to next 4 fixtures
  } catch (e) { 
    console.error("Fixture fetch failed", e);
    return []; 
  }
}

function renderCard(team, fixtures) {
  const fixtureHtml = fixtures.map(f => {
    // 1. Correctly identify Opposition (Whichever club is not Chelmsford)
    const isChelmsfordHome = String(f.home_club_id) === String(SITE_ID);
    const oppName = isChelmsfordHome ? f.away_club_name : f.home_club_name;
    
    // 2. Fix Ground Name and Competition details
    const ground = f.ground_name || "TBC";
    const compType = (f.competition_type || "").toLowerCase();
    const compName = f.competition_name || "Friendly";
    
    // 3. Highlight Logic
    const isChelmer = ground.includes("Chelmer Park");
    // League = Light Green, Cup = Light Red (using variables from your CSS)
    const bgClass = compType === "league" ? "bg-league" : (compType === "cup" ? "bg-cup" : "");

    return `
      <div class="fixture-row ${bgClass} ${isChelmer ? 'is-chelmer' : ''}">
        <div class="fixture-line-1">
          <span>${f.match_date}</span>
          <span>${stripChelmsford(oppName)}</span>
        </div>
        <div class="fixture-line-2">
          <span>${ground}</span>
          <span>${compName}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="match">
      <div class="match-header">${team.name}</div>
      <div class="fixtures-list">
        ${fixtureHtml || '<div class="fixture-row muted">No upcoming fixtures</div>'}
      </div>
    </div>
  `;
}

async function loadAndRender() {
  const grid = document.getElementById("grid");
  const data = await Promise.all(TEAMS.map(async t => ({ team: t, fix: await fetchFixtures(t.id) })));
  grid.innerHTML = data.map(d => renderCard(d.team, d.fix)).join("");
}

let cd = 300;
setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
  if(--cd < 0) { cd = 300; loadAndRender(); }
  document.getElementById("countdown").textContent = cd;
}, 1000);

loadAndRender();
</script>
</body>
</html>
