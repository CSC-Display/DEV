<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chelmsford CC – Forthcoming Fixtures (2026)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --green:#1f6b3a;
      --league-bg:#e3f2e7; /* light green */
      --cup-bg:#f3c6c6; /* light red */
      --bg:#f2f4f1;
      --card:#ffffff;
      --border:#d8ddd6;
      --muted:#7f887f;
      --ink:#1a1a1a;

      /* Layout vars measured in JS; these are safe fallbacks */
      --header-h: 84px;
      --footer-h: 56px;
    }

    *{box-sizing:border-box}

    html, body {
      height: 100vh;
      width: 100vw;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
    }

    /* ---------- HEADER (fixed/static at top) ---------- */
    header{
      background:var(--green);
      color:white;
      padding:14px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 0;
    }

    .brand img{
      width:56px;
      height:56px;
      object-fit:contain;
      background: rgba(255,255,255,.12);
      border-radius:12px;
      padding:6px;
      flex-shrink: 0;
    }

    header h1{
      margin:0;
      letter-spacing:4px;
      font-size:26px;
      line-height:1.05;
      white-space:nowrap;
    }

    header .small{
      font-size:16px;
      color:white;
      white-space:nowrap;
    }

    /* ---------- MAIN (fitted to screen between fixed header/footer) ---------- */
    main {
      position: fixed;
      top: var(--header-h);
      bottom: var(--footer-h);
      left: 0;
      right: 0;

      overflow-y: auto;
      overflow-x: hidden;

      padding: 12px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 12px;

      /* Helps TVs with overscan / prevents content kissing the edges */
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    @media (max-width:1400px){
      main{
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: none;
        grid-auto-rows: minmax(220px, auto);
      }
    }

    @media (max-width:900px){
      main{
        grid-template-columns: repeat(1,1fr);
        grid-template-rows: none;
        grid-auto-rows: minmax(220px, auto);
      }
    }

    .match {
      border: 2px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .match-header{
      padding:10px 12px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .fixtures-list{
      min-height: 0;
      overflow: hidden;
    }

    .fixture-row {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .fixture-row:last-child { border-bottom: none; }

    .fixture-line-1 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 2px;
    }

    .fixture-line-2 {
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .fixture-line-1 span:last-child,
    .fixture-line-2 span:last-child{
      text-align:right;
    }

    /* Background Logic */
    .bg-league { background-color: var(--league-bg); }
    .bg-cup { background-color: var(--cup-bg); }

    /* Ground Highlight Logic */
    .is-chelmer { font-weight: 800; }

    .muted{
      color:var(--muted);
      font-weight:500;
    }

    /* ---------- FOOTER (fixed/static at bottom) ---------- */
    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:56px;
      background:#eef2ec;
      border-top:2px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      font-size:14px;
      color:#4a514a;
      z-index: 50;
    }

    .footer .left{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .small_footer{
      font-size:12px;
      color: var(--muted);
    }

    .pill{
      background:white;
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
    }
  </style>
</head>

<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&bg=null&h=180&w=180&t=square&q=null" alt="Logo" />
    <div>
      <h1>FORTHCOMING FIXTURES</h1>
      <div class="small">Chelmsford Cricket Club</div>
    </div>
  </div>
  <h1>SEASON 2026</h1>
</header>

<main id="grid"></main>

<footer class="footer">
  <div class="left">
    <span class="pill">Refresh in <strong id="countdown">300</strong>s</span>
    <span class="small_footer" id="lastRefreshed">Last refreshed: —</span>
  </div>
  <div class="right">
    <span class="pill" id="clock">—</span>
  </div>
</footer>

<script>
// ------------------------
// Layout sync
// Measures actual header/footer heights and sets CSS vars so main sits correctly.
// ------------------------
function syncFixedLayoutHeights(){
  const h = document.querySelector("header");
  const f = document.querySelector("footer.footer");
  if (h) document.documentElement.style.setProperty("--header-h", h.offsetHeight + "px");
  if (f) document.documentElement.style.setProperty("--footer-h", f.offsetHeight + "px");
}
window.addEventListener("resize", syncFixedLayoutHeights);
window.addEventListener("load", syncFixedLayoutHeights);

const SITE_ID = 1786;
const SEASON = "2026";
const API_TOKEN = "8786d7c44061b7d624367d32177420e0";

const TEAMS = [
  { name:"Sat 1st XI", id:24293 },
  { name:"Sat 2nd XI", id:24294 },
  { name:"Sat 3rd XI", id:24295 },
  { name:"Sat 4th XI", id:30461 },
  { name:"Sat 5th XI", id:45348 },
  { name:"Sat 6th XI", id:105976 },
  { name:"NECL 1st XI", id:324716 },
  { name:"Sun 1st XI", id:30938 },
  { name:"Twenty20", id:133549 },
  { name:"Womens 1st XI", id:213007 }
];

const REFRESH_SECONDS = 300;

function pad2(n){ return String(n).padStart(2, "0"); }
function nowLocalString(){
  const d = new Date();
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function stripChelmsford(n){
  return String(n || "")
    .replace(/^\s*Chelmsford\s+(?:CC|Cricket\s+Club)?\s*/i, "")
    .trim();
}

async function fetchFixtures(teamId) {
  const url = `https://play-cricket.com/api/v2/matches.json?site_id=${SITE_ID}&season=${SEASON}&team_id=${teamId}&api_token=${API_TOKEN}`;

  // Set "tomorrow" at start of day for accurate comparison
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);

  try {
    const res = await fetch(url);
    const json = await res.json();

    return (json.matches || [])
      .filter(m => {
        // Only include fixtures without results
        if (m.result) return false;

        // Convert dd/mm/yyyy to a comparable date object
        const parts = m.match_date.split('/');
        const matchDate = new Date(parts[2], parts[1] - 1, parts[0]);

        // Only include fixtures from tomorrow onwards
        return matchDate >= tomorrow;
      })
      .sort((a, b) => {
        const dateA = new Date(a.match_date.split('/').reverse().join('-'));
        const dateB = new Date(b.match_date.split('/').reverse().join('-'));
        return dateA - dateB;
      })
      .slice(0, 6); // Limit to next 5 fixtures
  } catch (e) {
    console.error("Fixture fetch failed", e);
    return [];
  }
}

function renderCard(team, fixtures) {
  const fixtureHtml = fixtures.map(f => {
    // 1. Correctly identify Opposition (whichever club is not Chelmsford)
    const isChelmsfordHome = String(f.home_club_id) === String(SITE_ID);
    const oppName = isChelmsfordHome ? f.away_club_name : f.home_club_name;

    // 2. Fix Ground Name and Competition details
    const ground = f.ground_name || "TBC";
    const compType = (f.competition_type || "").toLowerCase();
    const compName = f.competition_name || "Friendly";

    // 3. Highlight Logic
    const isChelmer = ground.includes("Chelmer Park");

    // League = Light Green, Cup = Light Red
    const bgClass = compType === "league" ? "bg-league" : (compType === "cup" ? "bg-cup" : "");

    return `
      <div class="fixture-row ${bgClass} ${isChelmer ? 'is-chelmer' : ''}">
        <div class="fixture-line-1">
          <span>${f.match_date}</span>
          <span>${stripChelmsford(oppName)}</span>
        </div>
        <div class="fixture-line-2">
          <span>${ground}</span>
          <span>${compName}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="match">
      <div class="match-header">${team.name}</div>
      <div class="fixtures-list">
        ${fixtureHtml || '<div class="fixture-row muted">No upcoming fixtures</div>'}
      </div>
    </div>
  `;
}

async function loadAndRender() {
  const grid = document.getElementById("grid");
  const data = await Promise.all(TEAMS.map(async t => ({ team: t, fix: await fetchFixtures(t.id) })));
  grid.innerHTML = data.map(d => renderCard(d.team, d.fix)).join("");

  const lastEl = document.getElementById("lastRefreshed");
  if (lastEl) lastEl.textContent = `Last refreshed: ${nowLocalString()}`;

  // Re-sync once content/fonts have settled (important on TVs)
  setTimeout(syncFixedLayoutHeights, 50);
}

let cd = REFRESH_SECONDS;
setInterval(() => {
  document.getElementById("clock").textContent = nowLocalString();
  if (--cd < 0) {
    cd = REFRESH_SECONDS;
    loadAndRender();
  }
  document.getElementById("countdown").textContent = cd;
}, 1000);

syncFixedLayoutHeights();
loadAndRender();
</script>
</body>
</html>
