<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford CC – League Tables (1 of 3)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --green:#1f6b3a;
    --green-dark:#15512b;
    --green-soft:#e3f2e7;
    --bg:#f2f4f1;
    --card:#ffffff;
    --border:#d8ddd6;
    --muted:#6f786f;
    --ink:#1a1a1a;
    --danger:#b42318;
    --warning:#8a5a00;

    /* Autoscaling layout controls */
    --page-pad: clamp(6px, 0.8vw, 14px);
    --grid-gap: clamp(8px, 0.8vw, 16px);
    --card-min-width: clamp(420px, 42vw, 780px);
    --card-min-height: clamp(420px, 72vh, 920px);

    /* Autoscaling type controls */
    --header-title: clamp(18px, 1.35vw, 28px);
    --header-small: clamp(11px, 0.8vw, 16px);
    --season-text: clamp(16px, 1.2vw, 26px);
    --updated-text: clamp(10px, 0.7vw, 13px);
    --table-title: clamp(15px, 1.05vw, 22px);
    --table-font: clamp(11px, 0.82vw, 16px);
    --cell-y: clamp(4px, 0.45vh, 8px);
    --cell-x: clamp(4px, 0.35vw, 8px);
    --footer-text: clamp(10px, 0.75vw, 13px);
  }

  *{ box-sizing:border-box; }

  html,
  body{
    height:100vh;
    width:100vw;
    margin:0;
    overflow:hidden;
    background:var(--bg);
    font-family:"Segoe UI", Arial, sans-serif;
    color:var(--ink);
  }

  body{
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  header{
    background:var(--green);
    color:#fff;
    padding:clamp(7px, 0.8vh, 12px) clamp(12px, 1.2vw, 24px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    gap:clamp(8px, 0.8vw, 18px);
    min-height:0;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:clamp(8px, 0.8vw, 16px);
    min-width:0;
  }

  .brand img{
    width:clamp(38px, 3.1vw, 58px);
    height:clamp(38px, 3.1vw, 58px);
    object-fit:contain;
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:clamp(4px, 0.35vw, 6px);
    flex-shrink:0;
  }

  header h1{
    margin:0;
    letter-spacing:clamp(1px, 0.18vw, 4px);
    font-size:var(--header-title);
    line-height:1.05;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .subtitle{
    margin-top:2px;
    font-size:var(--header-small);
    opacity:.9;
    white-space:nowrap;
  }

  .season-block{
    text-align:right;
    flex-shrink:0;
  }

  .season-block .season{
    font-size:var(--season-text);
    letter-spacing:clamp(1px, 0.18vw, 3px);
    font-weight:800;
    white-space:nowrap;
  }

  .season-block .updated{
    margin-top:2px;
    font-size:var(--updated-text);
    opacity:.9;
    white-space:nowrap;
  }

  main{
    flex:1;
    min-height:0;
    padding:var(--page-pad);
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(var(--card-min-width), 1fr));
    grid-auto-rows:minmax(var(--card-min-height), auto);
    gap:var(--grid-gap);
    overflow:auto;
    align-content:start;
  }

  .table-container{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:var(--card-min-height);
    box-shadow:0 2px 8px rgba(0,0,0,.05);
  }

  .table-header{
    background:var(--green);
    color:#fff;
    padding:clamp(6px, 0.7vh, 10px) clamp(10px, 0.8vw, 16px);
    display:flex;
    justify-content:space-between;
    gap:clamp(8px, 0.8vw, 14px);
    align-items:center;
    font-weight:800;
    font-size:var(--table-title);
    text-transform:uppercase;
    flex-shrink:0;
    line-height:1.1;
  }

  .table-header .team-label{
    flex-shrink:0;
  }

  .table-header .division-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:right;
    min-width:0;
  }

  .scroll-area{
    flex:1;
    overflow:auto; /* never hides rows/columns on smaller displays */
    min-height:0;
  }

  table{
    width:100%;
    min-width:clamp(620px, 48vw, 900px);
    border-collapse:collapse;
    font-size:var(--table-font);
  }

  th{
    position:sticky;
    top:0;
    background:#f8f9f7;
    text-align:center;
    padding:var(--cell-y) var(--cell-x);
    border-bottom:2px solid var(--border);
    color:var(--muted);
    z-index:2;
    white-space:nowrap;
    font-weight:800;
  }

  td{
    padding:var(--cell-y) var(--cell-x);
    border-bottom:1px solid var(--border);
    white-space:nowrap;
    text-align:center;
    line-height:1.2;
  }

  th:first-child,
  td:first-child{
    width:clamp(32px, 2.3vw, 48px);
  }

  th.team-col,
  td.team-col{
    text-align:left;
    min-width:clamp(160px, 14vw, 260px);
    max-width:clamp(220px, 20vw, 380px);
  }

  td.team-col span{
    display:block;
    overflow:visible;
    white-space:normal;
    overflow-wrap:anywhere;
    word-break:normal;
  }

  tr.highlight{
    background-color:var(--green-soft) !important;
  }

  .bold{ font-weight:800; }

  .skeleton-box{
    background:#eee;
    height:20px;
    margin:10px;
    border-radius:4px;
    animation:pulse 1.5s infinite;
  }

  @keyframes pulse{
    0%{ opacity:1; }
    50%{ opacity:.5; }
    100%{ opacity:1; }
  }

  .message{
    grid-column:1 / -1;
    background:#fff;
    border:2px solid var(--border);
    border-radius:14px;
    padding:20px;
    text-align:center;
    font-size:clamp(13px, 0.9vw, 16px);
  }

  .message.error{
    color:var(--danger);
    border-color:#f0b8b2;
    background:#fff7f6;
  }

  .message.warning{
    color:var(--warning);
    border-color:#f1d28a;
    background:#fff9e8;
  }

  footer{
    background:var(--green-dark);
    color:#fff;
    min-height:clamp(28px, 3.3vh, 42px);
    padding:clamp(4px, 0.45vh, 7px) clamp(10px, 1vw, 16px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:var(--footer-text);
    flex-shrink:0;
  }

  footer span:last-child{
    text-align:right;
  }

  /* Large landscape screens: keep the 1st/2nd XI dashboard as two large side-by-side tables */
  @media (min-width:1700px) and (min-height:900px){
    :root{
      --card-min-width:620px;
      --card-min-height:calc(100vh - 92px - 38px - (2 * var(--page-pad)));
    }

    main{
      grid-template-columns:repeat(2, minmax(0, 1fr));
      grid-auto-rows:minmax(var(--card-min-height), auto);
      overflow:hidden;
    }
  }

  /* Medium displays: fewer columns if required, with scrolling rather than compression */
  @media (max-width:1200px){
    :root{
      --card-min-width:420px;
      --card-min-height:420px;
    }
  }

  /* Small screens: single column and natural document scrolling */
  @media (max-width:700px){
    html,
    body{
      overflow:auto;
      height:auto;
      min-height:100vh;
    }

    body{
      min-height:100vh;
    }

    header{
      align-items:flex-start;
      flex-direction:column;
    }

    header h1,
    .subtitle,
    .season-block .season,
    .season-block .updated{
      white-space:normal;
    }

    .season-block{
      text-align:left;
    }

    main{
      grid-template-columns:1fr;
      grid-auto-rows:minmax(360px, auto);
      overflow:visible;
    }

    .table-container{
      min-height:360px;
    }

    table{
      min-width:620px;
    }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&h=180&w=180&t=square" alt="Chelmsford Cricket Club logo" />
    <div>
      <h1>League Tables (1 of 3)</h1>
      <div class="subtitle">Chelmsford Cricket Club</div>
    </div>
  </div>
  <div class="season-block">
    <div class="season">SEASON 2026</div>
    <div class="updated" id="last-updated">Loading latest tables…</div>
  </div>
</header>

<main id="tables-grid" aria-live="polite"></main>

<footer>
  <span>Data generated from Play-Cricket via GitHub Actions</span>
  <span id="footer-clock"></span>
</footer>

<script>
/**
 * Chelmsford CC League Tables (1 of 3)
 *
 * GitHub Actions/static JSON version:
 * - This page does NOT call the Play-Cricket API directly.
 * - This page does NOT contain the API token.
 * - GitHub Actions should generate /data/cricket-league-tables.json.
 * - The browser reads that static JSON file from the same website.
 */

const DATA_URL = "../data/cricket-league-tables.json";
const REFRESH_MS = 5 * 60 * 1000; // re-read generated JSON every 5 minutes
const CLUB_NAME_MATCH = "chelmsford";

const DISPLAY_COLUMNS = [
  {
    label: "Team",
    type: "team",
    source: ["Team"]
  },
  {
    label: "P",
    title: "Played",
    source: ["p"]
  },
  {
    label: "W",
    title: "Won",
    source: ["W"],
    fallbackSource: ["w1", "w2", "w3", "wcn"],
    combineFallback: true
  },
  {
    label: "L",
    title: "Lost",
    source: ["L"],
    fallbackSource: ["l1", "l2", "l3", "lcn"],
    combineFallback: true
  },
  {
    label: "D",
    title: "Drawn / Tied",
    source: ["d", "t"],
    combine: true
  },
  {
    label: "Canc",
    title: "Cancelled / Abandoned",
    source: ["c", "a"],
    combine: true
  },
  {
    label: "BP",
    title: "Bonus Points",
    source: ["BP", "Bonus", "Bonus Points"]
  },
  {
    label: "Pen",
    title: "Penalties",
    source: ["Pen", "Penalty", "Penalty Points"]
  },
  {
    label: "Pts",
    title: "Points",
    source: ["Pts", "Points"]
  }
];

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function decodeBasicEntities(value){
  return String(value ?? "")
    .replaceAll("&amp;", "&")
    .replaceAll("&nbsp;", " ");
}

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function updateClock(){
  const el = document.getElementById("footer-clock");
  if(!el) return;
  el.textContent = new Date().toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

function normaliseHeading(value){
  return String(value || "")
    .trim()
    .toLowerCase();
}

function findColumnByHeading(headings, wantedHeading){
  const wanted = normaliseHeading(wantedHeading);
  return Object.keys(headings || {}).find(columnKey =>
    normaliseHeading(headings[columnKey]) === wanted
  );
}

function numericValue(value){
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function resolveDisplayColumns(headings){
  return DISPLAY_COLUMNS
    .map(displayColumn => {
      const primaryColumns = [...new Set(
        (displayColumn.source || [])
          .map(sourceHeading => findColumnByHeading(headings, sourceHeading))
          .filter(Boolean)
      )];

      if(primaryColumns.length > 0){
        return {
          ...displayColumn,
          sourceColumns: primaryColumns,
          combineActive: displayColumn.combine || primaryColumns.length > 1
        };
      }

      const fallbackColumns = [...new Set(
        (displayColumn.fallbackSource || [])
          .map(sourceHeading => findColumnByHeading(headings, sourceHeading))
          .filter(Boolean)
      )];

      return {
        ...displayColumn,
        sourceColumns: fallbackColumns,
        combineActive: displayColumn.combineFallback || fallbackColumns.length > 1
      };
    })
    .filter(displayColumn => {
      return displayColumn.type === "team" || displayColumn.sourceColumns.length > 0;
    });
}

function getDisplayValue(row, displayColumn){
  if(!displayColumn.sourceColumns.length){
    return "";
  }

  if(displayColumn.combineActive){
    return displayColumn.sourceColumns.reduce((total, columnKey) => {
      return total + numericValue(row[columnKey]);
    }, 0);
  }

  return row[displayColumn.sourceColumns[0]] ?? "";
}

function buildTableHtml(item){
  const config = item.config || {};
  const tableData = item.data || {};
  const headings = tableData.headings || {};
  const values = Array.isArray(tableData.values) ? tableData.values : [];
  const displayColumns = resolveDisplayColumns(headings);

  if(!displayColumns.length){
    return `
      <section class="table-container">
        <div class="table-header">
          <span class="team-label">${escapeHtml(config.label || "League table")}</span>
          <span class="division-name">No display columns found</span>
        </div>
        <div class="message warning">No matching columns were found in the generated JSON.</div>
      </section>`;
  }

  const rows = values.map(row => {
    const teamName = decodeBasicEntities(row.column_1 || "");
    const isChelmsford = teamName.toLowerCase().includes(CLUB_NAME_MATCH);

    const cells = displayColumns.map(displayColumn => {
      const rawValue = getDisplayValue(row, displayColumn);
      const value = displayColumn.type === "team"
        ? escapeHtml(decodeBasicEntities(rawValue))
        : escapeHtml(rawValue);
      const isTeam = displayColumn.type === "team";

      return isTeam
        ? `<td class="team-col bold"><span title="${value}">${value}</span></td>`
        : `<td>${value}</td>`;
    }).join("");

    return `
      <tr class="${isChelmsford ? "highlight" : ""}">
        <td class="bold">${escapeHtml(row.position)}</td>
        ${cells}
      </tr>`;
  }).join("");

  const headerCells = displayColumns.map(displayColumn => {
    const isTeam = displayColumn.type === "team";
    const title = escapeHtml(displayColumn.title || displayColumn.label);
    return `<th class="${isTeam ? "team-col" : ""}" title="${title}">${escapeHtml(displayColumn.label)}</th>`;
  }).join("");

  return `
    <section class="table-container">
      <div class="table-header">
        <span class="team-label">${escapeHtml(config.label || "League table")}</span>
        <span class="division-name" title="${escapeHtml(tableData.name || "")}">${escapeHtml(tableData.name || "")}</span>
      </div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              ${headerCells}
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="${displayColumns.length + 1}">No rows found in league table.</td></tr>`}
          </tbody>
        </table>
      </div>
    </section>`;
}

function setLoadingState(){
  const grid = document.getElementById("tables-grid");
  grid.innerHTML = `
    <section class="table-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>
    <section class="table-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>`;
}

function setErrorState(message){
  const grid = document.getElementById("tables-grid");
  grid.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
}

async function loadLeagueTables(){
  const response = await fetch(`${DATA_URL}?v=${Date.now()}`, {
    cache:"no-store"
  });

  if(!response.ok){
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${response.status}.`);
  }

  const json = await response.json();

  if(!Array.isArray(json)){
    throw new Error(`${DATA_URL} must contain a JSON array.`);
  }

  return json;
}

async function renderLeagueTables({showLoading = false} = {}){
  const updatedEl = document.getElementById("last-updated");

  if(showLoading) setLoadingState();

  try{
    const tables = await loadLeagueTables();

    if(!tables.length){
      setErrorState("The generated cricket-league-tables.json file is empty.");
      updatedEl.textContent = "No tables available";
      return;
    }

    document.getElementById("tables-grid").innerHTML = tables.map(buildTableHtml).join("");

    const fetchedDates = tables
      .map(item => item?.config?.fetched_at)
      .filter(Boolean)
      .sort();

    const latestFetched = fetchedDates.length ? fetchedDates[fetchedDates.length - 1] : null;
    updatedEl.textContent = latestFetched
      ? `Last updated: ${formatDateTime(latestFetched)}`
      : "Last updated time not supplied";

  }catch(err){
    console.error(err);
    setErrorState(
      `League tables could not be loaded. Check that ${DATA_URL} exists and is valid JSON.`
    );
    updatedEl.textContent = "League tables failed to load";
  }
}

updateClock();
setInterval(updateClock, 1000);
renderLeagueTables({showLoading:true});
setInterval(() => renderLeagueTables(), REFRESH_MS);
</script>
</body>
</html>
