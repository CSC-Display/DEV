<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8" />
<title>Chelmsford CC – League Tables (League Tables 1 of 3)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
    :root {
        --green: #1f6b3a;
        --green-soft: #e3f2e7;
        --bg: #f2f4f1;
        --card: #ffffff;
        --border: #d8ddd6;
        --muted: #7f887f;
        --ink: #1a1a1a;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100vh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: "Segoe UI", sans-serif;
        color: var(--ink);
    }

    body {
        display: flex;
        flex-direction: column;
    }

    header {
        background: var(--green);
        color: white;
        padding: 14px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .brand img {
        width: 56px;
        height: 56px;
        object-fit: contain;
        background: rgba(255,255,255,.12);
        border-radius: 12px;
        padding: 6px;
    }

    header h1 {
        margin: 0;
        letter-spacing: 2px;
        font-size: 24px;
        text-transform: uppercase;
    }

    main {
        flex: 1;
        padding: 12px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        overflow: hidden;
    }

    @media (max-width: 900px) {
        main {
            grid-template-columns: 1fr;
            overflow-y: auto;
        }
    }

    .table-container {
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .table-header {
        background: var(--green);
        color: white;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 14px;
        text-transform: uppercase;
    }

    .scroll-area {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
    }

    th {
        position: sticky;
        top: 0;
        background: #f8f9f7;
        text-align: left;
        padding: 8px 6px;
        border-bottom: 2px solid var(--border);
        color: var(--muted);
        z-index: 10;
    }

    td {
        padding: 6px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
    }

    tr.highlight {
        background-color: var(--green-soft) !important;
    }

    .bold {
        font-weight: 800;
    }

    .num {
        text-align: center;
    }

    .team-name {
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .skeleton-box {
        background: #eee;
        height: 20px;
        margin: 10px;
        border-radius: 4px;
        animation: pulse 1.5s infinite;
    }

    .error {
        grid-column: 1 / -1;
        padding: 20px;
        color: #b00020;
        background: #fff;
        border: 2px solid #f0c7cf;
        border-radius: 14px;
        text-align: center;
        font-weight: 600;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>
</head>

<body>

<header>
    <div class="brand">
        <img
            src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&h=180&w=180&t=square"
            alt="Chelmsford Cricket Club logo"
        />
        <div>
            <h1>League Tables (1 of 3)</h1>
            <div style="font-size: 14px; opacity: 0.9;">Chelmsford Cricket Club</div>
        </div>
    </div>
    <h1>Season 2026</h1>
</header>

<main id="tables-grid"></main>

<script>
const SITE_ID = 1786;
const SEASON = "2026";

/*
    The API token is no longer stored in this HTML file.

    This page calls your own serverless Node endpoint:
        /api/playcricket?endpoint=...

    The serverless function then adds the private Play-Cricket API token
    from an environment variable.
*/

const TARGET_TEAMS = [
    {
        label: "Saturday 1st XI",
        team_id: 24293,
        fallback_div: 135282,
        display_columns: ["Pos", "Team", "P", "W", "L", "D", "Off", "BP", "Pen", "Pts"],
        column_combinations: {
            W: [3, 5, 7, 12],
            L: [4, 6, 8, 11],
            D: [13, 14],
            Off: [9, 10],
            BP: [15],
            Pen: [16],
            Pts: [18]
        }
    },
    {
        label: "Saturday 2nd XI",
        team_id: 24294,
        fallback_div: 135299,
        display_columns: ["Pos", "Team", "P", "W", "L", "D", "Off", "BP", "Pen", "Pts"],
        column_combinations: {
            W: [3, 5, 7, 12],
            L: [4, 6, 8, 11],
            D: [13, 14],
            Off: [9, 10],
            BP: [15],
            Pen: [16],
            Pts: [18]
        }
    }
];

async function apiGet(endpoint) {
    const response = await fetch(`/api/playcricket?endpoint=${encodeURIComponent(endpoint)}`);

    if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`API connection failed: ${response.status} ${response.statusText}. ${errorText}`);
    }

    return await response.json();
}

function sumCols(rowData, colIndexes) {
    if (!colIndexes) return 0;

    return colIndexes.reduce((acc, idx) => {
        return acc + Number(rowData[`column_${idx}`] || 0);
    }, 0);
}

function safeText(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function buildTableHtml(tableData, config) {
    const values = tableData?.values || [];

    const rows = values.map(v => {
        const teamName = v.column_1 || "";
        const isChelmsford = teamName.toLowerCase().includes("chelmsford");
        const combos = config.column_combinations;

        const dataMap = {
            "Pos": `<td class="num bold">${safeText(v.position)}</td>`,
            "Team": `<td class="team-name bold">${safeText(teamName)}</td>`,
            "P": `<td class="num">${safeText(v.column_2)}</td>`,
            "W": `<td class="num">${sumCols(v, combos.W)}</td>`,
            "L": `<td class="num">${sumCols(v, combos.L)}</td>`,
            "D": `<td class="num">${sumCols(v, combos.D)}</td>`,
            "Off": `<td class="num">${sumCols(v, combos.Off)}</td>`,
            "BP": `<td class="num">${sumCols(v, combos.BP)}</td>`,
            "Pen": `<td class="num">${sumCols(v, combos.Pen)}</td>`,
            "Pts": `<td class="num bold">${sumCols(v, combos.Pts)}</td>`
        };

        return `
            <tr class="${isChelmsford ? "highlight" : ""}">
                ${config.display_columns.map(colName => dataMap[colName] || "").join("")}
            </tr>
        `;
    }).join("");

    return `
        <div class="table-container">
            <div class="table-header">${safeText(config.label)} - ${safeText(tableData.name)}</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            ${config.display_columns.map(h => `<th class="num">${safeText(h)}</th>`).join("")}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

async function init() {
    const grid = document.getElementById("tables-grid");

    grid.innerHTML = TARGET_TEAMS.map(() => `
        <div class="table-container">
            <div class="skeleton-box"></div>
            <div class="skeleton-box"></div>
            <div class="skeleton-box"></div>
        </div>
    `).join("");

    try {
        const matchData = await apiGet(`matches.json?site_id=${SITE_ID}&season=${SEASON}`);
        const matches = matchData.matches || [];

        const tables = await Promise.all(
            TARGET_TEAMS.map(async target => {
                const match = matches.find(m =>
                    m.division_id &&
                    (
                        String(m.home_team_id) === String(target.team_id) ||
                        String(m.away_team_id) === String(target.team_id)
                    )
                );

                const divId = match ? match.division_id : target.fallback_div;

                if (!divId) {
                    return null;
                }

                const res = await apiGet(`league_table.json?division_id=${divId}`);

                if (!res.league_table || !res.league_table[0]) {
                    return null;
                }

                return {
                    data: res.league_table[0],
                    config: target
                };
            })
        );

        const html = tables
            .filter(Boolean)
            .map(item => buildTableHtml(item.data, item.config))
            .join("");

        grid.innerHTML = html || `
            <div class="error">
                No league tables were returned.
            </div>
        `;

    } catch (error) {
        console.error(error);

        grid.innerHTML = `
            <div class="error">
                League tables failed to load. Check the serverless Node function and the Play-Cricket API token.
            </div>
        `;
    }
}

init();
</script>

</body>
</html>
