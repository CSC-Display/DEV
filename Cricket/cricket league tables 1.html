<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford CC – League Tables (1 of 3)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>

  :root{
    --green:#1f6b3a;
    --green-dark:#15512b;
    --green-soft:#e3f2e7;
    --bg:#f2f4f1;
    --card:#ffffff;
    --border:#d8ddd6;
    --muted:#6f786f;
    --ink:#1a1a1a;
    --danger:#b42318;
    --warning:#8a5a00;
    --grid-cols:2;
    --main-pad:10px;
    --grid-gap:10px;
    --table-font:13px;
    --cell-pad-y:5px;
    --cell-pad-x:5px;
    --team-min:170px;
    --team-max:320px;
    --header-font:24px;
    --table-header-font:16px;
  }

  *{ box-sizing:border-box; }

  html,
  body{
    height:100vh;
    width:100vw;
    margin:0;
    overflow:hidden;
    background:var(--bg);
    font-family:"Segoe UI", Arial, sans-serif;
    color:var(--ink);
  }

  body{
    display:flex;
    flex-direction:column;
  }

  header{
    background:var(--green);
    color:#fff;
    padding:10px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    gap:18px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }

  .brand img{
    width:50px;
    height:50px;
    object-fit:contain;
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:5px;
    flex-shrink:0;
  }

  header h1{
    margin:0;
    letter-spacing:3px;
    font-size:var(--header-font);
    line-height:1.05;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .subtitle{
    margin-top:2px;
    font-size:13px;
    opacity:.9;
  }

  .season-block{
    text-align:right;
    flex-shrink:0;
  }

  .season-block .season{
    font-size:24px;
    letter-spacing:3px;
    font-weight:800;
    white-space:nowrap;
  }

  .season-block .updated{
    margin-top:2px;
    font-size:11px;
    opacity:.9;
  }

  main{
    flex:1;
    min-height:0;
    padding:var(--main-pad);
    display:grid;
    grid-template-columns:repeat(var(--grid-cols), minmax(0, 1fr));
    gap:var(--grid-gap);
    overflow:hidden;
  }

  .table-container{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:0;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
  }

  .table-header{
    background:var(--green);
    color:#fff;
    padding:8px 14px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    font-weight:800;
    font-size:var(--table-header-font);
    text-transform:uppercase;
    flex-shrink:0;
    line-height:1.1;
  }

  .table-header .team-label{
    flex-shrink:0;
  }

  .table-header .division-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:right;
  }

  .scroll-area{
    flex:1;
    min-height:0;
    overflow:auto;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:var(--table-font);
  }

  th{
    position:sticky;
    top:0;
    background:#f8f9f7;
    text-align:center;
    padding:var(--cell-pad-y) var(--cell-pad-x);
    border-bottom:2px solid var(--border);
    color:var(--muted);
    z-index:2;
    white-space:nowrap;
    font-weight:800;
  }

  td{
    padding:var(--cell-pad-y) var(--cell-pad-x);
    border-bottom:1px solid var(--border);
    white-space:nowrap;
    text-align:center;
    line-height:1.2;
  }

  th.pos-col,
  td.pos-col{
    width:34px;
  }

  th.team-col,
  td.team-col{
    text-align:left;
    min-width:var(--team-min);
    max-width:var(--team-max);
  }

  td.team-col span{
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  tr.highlight{
    background-color:var(--green-soft) !important;
  }

  .bold{ font-weight:800; }

  .skeleton-box{
    background:#eee;
    height:20px;
    margin:10px;
    border-radius:4px;
    animation:pulse 1.5s infinite;
  }

  @keyframes pulse{
    0%{ opacity:1; }
    50%{ opacity:.5; }
    100%{ opacity:1; }
  }

  .message{
    grid-column:1 / -1;
    background:#fff;
    border:2px solid var(--border);
    border-radius:14px;
    padding:20px;
    text-align:center;
    font-size:15px;
  }

  .message.error{
    color:var(--danger);
    border-color:#f0b8b2;
    background:#fff7f6;
  }

  .message.warning{
    color:var(--warning);
    border-color:#f1d28a;
    background:#fff9e8;
  }

  footer{
    background:var(--green-dark);
    color:#fff;
    min-height:28px;
    padding:4px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    font-size:12px;
    flex-shrink:0;
  }

  footer span:last-child{
    text-align:right;
  }

  @media (width:1920px) and (height:1080px){
    html, body{ width:1920px; height:1080px; }
  }

  @media (max-width:1300px){
    :root{ --grid-cols:2; }
    main{ overflow-y:auto; }
  }

  @media (max-width:900px){
    html, body{ overflow:auto; height:auto; min-height:100vh; }
    body{ min-height:100vh; }
    header{
      align-items:flex-start;
      flex-direction:column;
    }
    .season-block{ text-align:left; }
    :root{ --grid-cols:1; }
    main{ overflow:visible; }
  }


:root{
  --grid-cols:2;
  --table-font:15px;
  --cell-pad-y:6px;
  --cell-pad-x:6px;
  --team-min:190px;
  --team-max:360px;
  --table-header-font:20px;
}

</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&h=180&w=180&t=square" alt="Chelmsford Cricket Club logo" />
    <div>
      <h1>League Tables (1 of 3)</h1>
      <div class="subtitle">Chelmsford Cricket Club</div>
    </div>
  </div>
  <div class="season-block">
    <div class="season">SEASON 2026</div>
    <div class="updated" id="last-updated">Loading latest tables…</div>
  </div>
</header>

<main id="tables-grid" aria-live="polite"></main>

<footer>
  <span>Data generated from Play-Cricket via GitHub Actions</span>
  <span id="footer-clock"></span>
</footer>

<script>
const DATA_URL = "../data/cricket-league-tables.json";
const REFRESH_MS = 5 * 60 * 1000;
const CLUB_NAME_MATCH = "chelmsford";
const SKELETON_COUNT = 2;

const DISPLAY_COLUMNS = [
  { label:"Team", type:"team", source:["Team"] },
  { label:"P", title:"Played", source:["p"] },
  { label:"W", title:"Won", source:["W"], fallbackSource:["w1", "w2", "w3", "wcn"], combineFallback:true },
  { label:"L", title:"Lost", source:["L"], fallbackSource:["l1", "l2", "l3", "lcn"], combineFallback:true },
  { label:"D", title:"Drawn / Tied", source:["d", "t"], combine:true },
  { label:"Canc", title:"Cancelled / Abandoned", source:["c", "a"], combine:true },
  { label:"BP", title:"Bonus Points", source:["BP", "Bonus", "Bonus Points"] },
  { label:"Pen", title:"Penalties", source:["Pen", "Penalty", "Penalty Points"] },
  { label:"Pts", title:"Points", source:["Pts", "Points"] }
];


function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function decodeBasicEntities(value){
  return String(value ?? "")
    .replaceAll("&amp;", "&")
    .replaceAll("&nbsp;", " ");
}

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function updateClock(){
  const el = document.getElementById("footer-clock");
  if(!el) return;
  el.textContent = new Date().toLocaleString("en-GB", {
    weekday:"short",
    day:"2-digit",
    month:"short",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

function normaliseHeading(value){
  return String(value || "").trim().toLowerCase();
}

function findColumnByHeading(headings, wantedHeading){
  const wanted = normaliseHeading(wantedHeading);
  return Object.keys(headings || {}).find(columnKey =>
    normaliseHeading(headings[columnKey]) === wanted
  );
}

function numericValue(value){
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function resolveDisplayColumns(headings){
  return DISPLAY_COLUMNS
    .map(displayColumn => {
      const primaryColumns = [...new Set(
        (displayColumn.source || [])
          .map(sourceHeading => findColumnByHeading(headings, sourceHeading))
          .filter(Boolean)
      )];

      if(primaryColumns.length > 0){
        return {
          ...displayColumn,
          sourceColumns: primaryColumns,
          combineActive: displayColumn.combine || primaryColumns.length > 1
        };
      }

      const fallbackColumns = [...new Set(
        (displayColumn.fallbackSource || [])
          .map(sourceHeading => findColumnByHeading(headings, sourceHeading))
          .filter(Boolean)
      )];

      return {
        ...displayColumn,
        sourceColumns: fallbackColumns,
        combineActive: displayColumn.combineFallback || fallbackColumns.length > 1
      };
    })
    .filter(displayColumn => {
      return displayColumn.type === "team" || displayColumn.sourceColumns.length > 0;
    });
}

function getDisplayValue(row, displayColumn){
  if(!displayColumn.sourceColumns.length) return "";

  if(displayColumn.combineActive){
    return displayColumn.sourceColumns.reduce((total, columnKey) => {
      return total + numericValue(row[columnKey]);
    }, 0);
  }

  return row[displayColumn.sourceColumns[0]] ?? "";
}

function buildTableHtml(item){
  const config = item.config || {};
  const tableData = item.data || {};
  const headings = tableData.headings || {};
  const values = Array.isArray(tableData.values) ? tableData.values : [];
  const displayColumns = resolveDisplayColumns(headings);

  if(!displayColumns.length){
    return `
      <section class="table-container">
        <div class="table-header">
          <span class="team-label">${escapeHtml(config.label || "League table")}</span>
          <span class="division-name">No display columns found</span>
        </div>
        <div class="message warning">No matching columns were found in the generated JSON.</div>
      </section>`;
  }

  const rows = values.map(row => {
    const teamName = decodeBasicEntities(row.column_1 || "");
    const isChelmsford = teamName.toLowerCase().includes(CLUB_NAME_MATCH);

    const cells = displayColumns.map(displayColumn => {
      const rawValue = getDisplayValue(row, displayColumn);
      const value = displayColumn.type === "team"
        ? escapeHtml(decodeBasicEntities(rawValue))
        : escapeHtml(rawValue);

      return displayColumn.type === "team"
        ? `<td class="team-col bold"><span title="${value}">${value}</span></td>`
        : `<td>${value}</td>`;
    }).join("");

    return `
      <tr class="${isChelmsford ? "highlight" : ""}">
        <td class="pos-col bold">${escapeHtml(row.position)}</td>
        ${cells}
      </tr>`;
  }).join("");

  const headerCells = displayColumns.map(displayColumn => {
    const title = escapeHtml(displayColumn.title || displayColumn.label);
    return `<th class="${displayColumn.type === "team" ? "team-col" : ""}" title="${title}">${escapeHtml(displayColumn.label)}</th>`;
  }).join("");

  return `
    <section class="table-container">
      <div class="table-header">
        <span class="team-label">${escapeHtml(config.label || "League table")}</span>
        <span class="division-name" title="${escapeHtml(tableData.name || "")}">${escapeHtml(tableData.name || "")}</span>
      </div>
      <div class="scroll-area">
        <table>
          <thead>
            <tr>
              <th class="pos-col">Pos</th>
              ${headerCells}
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="${displayColumns.length + 1}">No rows found in league table.</td></tr>`}
          </tbody>
        </table>
      </div>
    </section>`;
}

function setLoadingState(){
  const grid = document.getElementById("tables-grid");
  grid.innerHTML = `<section class="table-container"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></section>`.repeat(SKELETON_COUNT);
}

function setErrorState(message){
  const grid = document.getElementById("tables-grid");
  grid.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
}

async function loadLeagueTables(){
  const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache:"no-store" });

  if(!response.ok){
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${response.status}.`);
  }

  const json = await response.json();

  if(!Array.isArray(json)){
    throw new Error(`${DATA_URL} must contain a JSON array.`);
  }

  return json;
}

async function renderLeagueTables({showLoading = false} = {}){
  const updatedEl = document.getElementById("last-updated");

  if(showLoading) setLoadingState();

  try{
    const tables = await loadLeagueTables();

    if(!tables.length){
      setErrorState(`The generated ${DATA_URL} file is empty.`);
      updatedEl.textContent = "No tables available";
      return;
    }

    document.getElementById("tables-grid").innerHTML = tables.map(buildTableHtml).join("");

    const fetchedDates = tables
      .map(item => item?.config?.fetched_at)
      .filter(Boolean)
      .sort();

    const latestFetched = fetchedDates.length ? fetchedDates[fetchedDates.length - 1] : null;
    updatedEl.textContent = latestFetched
      ? `Last updated: ${formatDateTime(latestFetched)}`
      : "Last updated time not supplied";

  }catch(err){
    console.error(err);
    setErrorState(`League tables could not be loaded. Check that ${DATA_URL} exists and is valid JSON.`);
    updatedEl.textContent = "League tables failed to load";
  }
}

updateClock();
setInterval(updateClock, 1000);
renderLeagueTables({showLoading:true});
setInterval(() => renderLeagueTables(), REFRESH_MS);

</script>
</body>
</html>
