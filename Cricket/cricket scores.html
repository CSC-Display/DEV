<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chelmsford CC – Latest Results (2026)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --green:#1f6b3a;
      --green-dark:#16522c;
      --green-soft:#e3f2e7;
      --win:#1f6b3a;      /* dark green */
      --lost:#f3c6c6;     /* light red */
      --tied:#f6e0b4;     /* light orange */
      --other:#dff2e6;    /* light green */
      --live:#ff9800;      /* orange */
      --bg:#f2f4f1;
      --card:#ffffff;
      --border:#d8ddd6;
      --muted:#7f887f;
      --ink:#1a1a1a;

      /* Layout vars measured in JS; tuned fallbacks for 1920x1080 TV */
      --header-h: 74px;
      --footer-h: 34px;
      --main-pad: 10px;
      --grid-gap: 10px;
    }

    *{ box-sizing:border-box; }

    html,
    body{
      height:100vh;
      width:100vw;
      margin:0;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family:"Segoe UI", system-ui, sans-serif;
      color:var(--ink);
    }

    /* ---------- HEADER: fixed and compact for 1080p ---------- */
    header{
      background:var(--green);
      color:#fff;
      padding:10px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand img{
      width:50px;
      height:50px;
      object-fit:contain;
      background:rgba(255,255,255,.12);
      border-radius:12px;
      padding:5px;
      flex-shrink:0;
    }

    header h1{
      margin:0;
      letter-spacing:3px;
      font-size:24px;
      line-height:1.05;
      white-space:nowrap;
      text-transform:uppercase;
    }

    header .season{
      font-size:22px;
      opacity:.95;
      text-align:right;
      white-space:nowrap;
    }

    header .small{
      font-size:13px;
      color:#fff;
      white-space:nowrap;
      margin-top:2px;
    }

    /* ---------- MAIN: fixed between header and footer ---------- */
    main{
      position:fixed;
      top:var(--header-h);
      bottom:var(--footer-h);
      left:0;
      right:0;
      overflow:hidden;
      padding:var(--main-pad);
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      grid-template-rows:repeat(2, minmax(0, 1fr));
      gap:var(--grid-gap);
    }

    .match{
      border:2px solid var(--border);
      border-radius:14px;
      background:var(--card);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:0;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }

    .match-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:7px 10px;
      background:var(--other);
      flex-shrink:0;
      min-height:42px;
    }

    .match-header.win{ background:var(--win); color:#fff; }
    .match-header.lost{ background:var(--lost); color:#391a1a; }
    .match-header.tied{ background:var(--tied); color:#3a2a10; }
    .match-header.other{ background:var(--other); color:#16331f; }
    .match-header.live{ background:var(--live); color:#fff; }

    .status{
      background:rgba(0,0,0,.14);
      color:inherit;
      padding:3px 8px;
      border-radius:8px;
      font-size:24px;
      font-weight:800;
      letter-spacing:.3px;
      white-space:nowrap;
    }

    .match-header.win .status{
      background:rgba(255,255,255,.22);
    }

    .summary{
      font-size:24px;
      font-weight:900;
      letter-spacing:.5px;
      text-transform:uppercase;
      opacity:.95;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .teams{
      padding:8px 10px;
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .team{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:flex-start;
      padding:5px 0;
      border-top:1px solid var(--border);
      min-height:0;
    }

    .team:first-child{ border-top:none; }

    .team-name{
      font-weight:700;
      font-size:20px;
      flex:1;
      min-width:0;
      padding-right:8px;
      line-height:1.15;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    .scoreblock{
      text-align:right;
      min-width:96px;
      line-height:1.1;
      flex-shrink:0;
    }

    .score{
      font-weight:600;
      font-size:20px;
      white-space:nowrap;
    }

    .overs{
      font-weight:500;
      font-size:20px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap;
    }

    .perf-list{
      width:100%;
      margin-top:3px;
      font-size:18px;
      color:#444;
      font-weight:500;
      overflow:hidden;
    }

    .perf-item{
      display:block;
      line-height:1.2;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:6px;
      padding-top:6px;
      border-top:1px dashed var(--border);
      color:var(--muted);
      font-size:14px;
      line-height:1.15;
      flex-shrink:0;
    }

    .meta span{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }


    /* ---------- MATCH TEAM TITLE: new top header strip ---------- */
    .match-team-title{
      background:var(--green);
      color:#fff;
      padding:7px 10px;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:20px;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.05;
      flex-shrink:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Existing status/result header now sits beneath the team title */
    .match-header{
      border-radius:0;
    }

    /* Larger spacing inside the match body */
    .team.opposition{
      margin-top:24px;
    }

    .meta{
      margin-top:24px;
      padding-top:12px;
    }

    /* Let the body of each match card expand so the form footer is pushed to the bottom */
    .teams{
      flex:1 1 auto;
    }

    /* ---------- MATCH FOOTER: mirrors match header and holds the form guide ---------- */
    .match-footer{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:7px 10px;
      background:var(--other); /* always light green, irrespective of result */
      color:#16331f;
      flex-shrink:0;
      min-height:42px;
      border-top:2px solid var(--border);
      text-align:center;
      margin-top:auto; /* anchor to the bottom of the match box */
    }

    .form-guide{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      font-size:18px;
      font-weight:900;
      color:#16331f;
    }

    .form-label{
      font-size:20px;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .form-dots{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      min-width:0;
    }

    .form-dot{
      width:28px;
      height:28px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:2px solid transparent;
      font-size:15px;
      line-height:1;
      font-weight:900;
      flex:0 0 auto;
    }

    .form-dot.win{
      background:#1f8f45;
      color:#fff;
      border-color:#1f8f45;
    }

    .form-dot.loss{
      background:#d93025;
      color:#fff;
      border-color:#d93025;
    }

    .form-dot.other{
      background:#ffd84d;
      color:#1a1a1a;
      border-color:#e0bd2f;
    }

    .form-dot.none{
      background:#fff;
      color:#fff;
      border-color:#000;
    }

    .muted{
      color:var(--muted);
      font-weight:600;
      font-size:16px;
    }

    /* ---------- FOOTER: fixed and compact ---------- */
    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:34px;
      background:#eef2ec;
      border-top:2px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      font-size:12px;
      color:#4a514a;
      z-index:50;
    }

    .footer .left{
      display:flex;
      gap:10px;
      align-items:center;
      min-width:0;
    }

    .pill{
      background:#fff;
      border:1px solid var(--border);
      padding:4px 9px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
    }

    .small_footer{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .skeleton{
      background:linear-gradient(90deg, #f1f3f0, #e7ebe6, #f1f3f0);
      background-size:200% 100%;
      animation:shimmer 1.1s infinite;
      border-radius:10px;
      height:14px;
      width:70%;
    }

    @keyframes shimmer{
      0%{ background-position:200% 0; }
      100%{ background-position:-200% 0; }
    }

    /* Exact target profile: 1920x1080 widescreen TV */
    @media (width:1920px) and (height:1080px){
      html, body{ width:1920px; height:1080px; }
    }

    @media (max-width:1400px){
      main{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        grid-template-rows:none;
        overflow-y:auto;
      }
    }

    @media (max-width:900px){
      html, body{
        overflow:auto;
        height:auto;
        min-height:100vh;
      }

      header{
        align-items:flex-start;
        flex-direction:column;
      }

      main{
        position:static;
        display:grid;
        grid-template-columns:1fr;
        grid-template-rows:none;
        overflow:visible;
        padding-top:calc(var(--header-h) + 10px);
        padding-bottom:calc(var(--footer-h) + 10px);
      }
    }
  </style>
</head>

<body>
<header>
  <div class="brand">
    <!-- Club badge (public URL). You can replace with a local file if preferred. -->
    <img
      src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&bg=null&h=180&w=180&t=square&q=null"
      alt="Chelmsford Cricket Club badge"
    />
    <div>
      <h1>LATEST RESULTS</h1>
      <div class="small">Chelmsford Cricket Club</div>
    </div>
  </div>
  <h1>SEASON 2026</h1>
</header>

<main id="grid"></main>

<footer class="footer">
  <div class="left">
    <span class="pill">Refresh in <strong id="countdown">300</strong>s</span>
    <span class="small_footer" id="lastRefreshed">Last refreshed: —</span>
  </div>
  <div class="right">
    <span class="pill" id="clock">—</span>
  </div>
</footer>

<script>
  // ------------------------
  // Layout sync (FIX)
  // Measures actual header/footer heights and sets CSS vars so main sits correctly.
  // ------------------------
  function syncFixedLayoutHeights(){
    const h = document.querySelector("header");
    const f = document.querySelector("footer.footer");
    if (h) document.documentElement.style.setProperty("--header-h", h.offsetHeight + "px");
    if (f) document.documentElement.style.setProperty("--footer-h", f.offsetHeight + "px");
  }
  window.addEventListener("resize", syncFixedLayoutHeights);
  window.addEventListener("load", syncFixedLayoutHeights);

  // ========================
  // CONFIG
  // ========================
  const SITE_ID = 1786;
  const SEASON = "2026";
  const DATA_URL = "../data/cricket-scores.json";

  // Chelmsford teams
  const TEAMS = [
    { name:"Sat 1st XI", id:24293 },
    { name:"Sat 2nd XI", id:24294 },
    { name:"Sat 3rd XI", id:24295 },
    { name:"Sat 4th XI", id:30461 },
    { name:"Sat 5th XI", id:45348 },
    { name:"Sat 6th XI", id:105976 },
    { name:"NECL 1st XI", id:324716 },
    { name:"Sun 1st XI", id:30938 },
    { name:"Twenty20", id:133549 },
    { name:"Womens 1st XI", id:213007 }
  ];

  const REFRESH_SECONDS = 300;

  // ========================
  // HELPERS (existing)
  // ========================
  function pad2(n){ return String(n).padStart(2, "0"); }
  function nowLocalString(){
    const d = new Date();
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function parseDMY(dmy){
    const m = String(dmy || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return 0;
    const dd = +m[1], mm = +m[2], yyyy = +m[3];
    return new Date(yyyy, mm-1, dd).getTime();
  }
  function isTodayDMY(dmy){
    const m = String(dmy || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return false;
    const dd = Number(m[1]);
    const mm = Number(m[2]) - 1;
    const yyyy = Number(m[3]);
    const now = new Date();
    return (
      now.getDate() === dd &&
      now.getMonth() === mm &&
      now.getFullYear() === yyyy
    );
  }
  function safeText(x){
    return (x === null || x === undefined || x === "") ? "—" : String(x);
  }
  // Remove a leading "Chelmsford CC" or "Chelmsford Cricket Club" prefix from a label (case-insensitive).
  function stripChelmsfordPrefix(label){
    return String(label || "")
      .replace(/^\s*Chelmsford\s+(?:CC|Cricket\s+Club)\s*/i, "")
      .trim();
  }
  function pickList(json){
    return json?.result_summary || [];
  }
  function pickLatest(list){
    return (list || []).slice().sort((a,b) => {
      const ad = parseDMY(a.match_date) || parseDMY(a.last_updated) || 0;
      const bd = parseDMY(b.match_date) || parseDMY(b.last_updated) || 0;
      if (bd !== ad) return bd - ad;
      return (b.id || 0) - (a.id || 0);
    })[0] || null;
  }
function isLive(match){
  if (!match) return false;

  // Only today's matches can ever be live
  if (!isTodayDMY(match.match_date)){
    return false;
  }

  const desc = String(match.result_description || "").toLowerCase();

  // Explicit completed states
  const isCompleted =
  desc.includes("won") ||
  desc.includes("tied") ||
  desc.includes("draw") ||
  desc.includes("abandoned") ||
  desc.includes("cancelled") ||
  desc.includes("no result");

  if (isCompleted){
    return false;
  }

  // Explicit live wording
  if (
    desc.includes("in progress") ||
    desc.includes("live") ||
    desc.includes("innings break") ||
    desc.includes("interval") ||
    desc.includes("tea") ||
    desc.includes("lunch")
  ){
    return true;
  }

  // Fallback:
  // If today's match has score data and no completed result,
  // assume it is live
  const innings = match.innings || [];
const hasScoreData = innings.some(i =>
  i &&
  (
    i.runs !== "" ||
    i.wickets !== "" ||
    i.overs !== ""
  )
);

  return hasScoreData;
}

function statusLabel(match){
  if (!match) return "Awaiting";

  const desc = String(match.result_description || "").toLowerCase();

  if (isLive(match)){
    return "LIVE";
  }
  const isCompleted =
  desc.includes("won") ||
  desc.includes("tied") ||
  desc.includes("draw") ||
  desc.includes("abandoned") ||
  desc.includes("cancelled") ||
  desc.includes("no result");

  if (isCompleted){
    return "Result";
  }

  return "Awaiting";
}

  function outcomeForChelmsford(match, chelmsfordTeamId){
    if (!match) return { tag:"", cls:"other" };
    if (isLive(match)){
      return { tag:"LIVE", cls:"live" };
    }
    const code = match.result;
    const winner = String(match.result_applied_to || "");
    const chel = String(chelmsfordTeamId);
    if (code === "W" && winner){
      if (winner === chel) return { tag:"WON", cls:"win" };
      return { tag:"LOST", cls:"lost" };
    }
    if (code === "L") return { tag:"LOST", cls:"lost" };
    if (code === "T") return { tag:"TIED", cls:"tied" };
    if (code === "D") return { tag:"DRAWN", cls:"tied" };
    if (code === "C") return { tag:"CANCELLED", cls:"other" };
    if (code === "A") return { tag:"ABANDONED", cls:"other" };
    if (code === "N") return { tag:"NO RESULT", cls:"other" };
    const desc = (match.result_description || "").toLowerCase();
    if (desc.includes("won") && desc.includes("chelmsford")) return { tag:"WON", cls:"win" };
    if (desc.includes("won")) return { tag:"LOST", cls:"lost" };
    return { tag:"", cls:"other" };
  }
  function scoreParts(match, teamId){
    const inn = (match.innings || []).find(i => String(i.team_batting_id) === String(teamId));
    if (!inn || inn.runs === "" || inn.wickets === "") return { score:"—", overs:"" };
    const overs = inn.overs ? `${inn.overs} ov` : "";
    return { score: `${inn.runs}/${inn.wickets}`, overs };
  }
  // Simple HTML escape for inserted text
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, ch => ({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[ch]));
  }

  // ========================
  // FORM GUIDE HELPERS
  // ========================
  function dateValueForMatch(match){
    if (!match) return 0;
    return parseDMY(match.match_date) || parseDMY(match.last_updated) || 0;
  }

  function isCompletedForForm(match){
    if (!match) return false;
    const code = String(match.result || "").trim();
    const desc = String(match.result_description || "").trim();
    return Boolean(code || desc || match.result_locked === "true");
  }

  function normaliseFormCode(item, chelmsfordTeamId){
    if (!item) return "none";

    // Supports either full Play-Cricket match objects or simple values such as "W", "L", "D".
    if (typeof item === "string"){
      const code = item.trim().toUpperCase();
      if (code === "W") return "win";
      if (code === "L") return "loss";
      if (["D", "T", "C", "A", "N"].includes(code)) return "other";
      return "none";
    }

    const code = String(item.result || item.outcome || item.form || "").trim().toUpperCase();
    const winner = String(item.result_applied_to || item.winner_team_id || "").trim();
    const chel = String(chelmsfordTeamId);
    const desc = String(item.result_description || "").toLowerCase();

    if (code === "W"){
      if (winner) return winner === chel ? "win" : "loss";
      if (desc.includes("chelmsford") && desc.includes("won")) return "win";
      return "win";
    }

    if (code === "L") return "loss";
    if (["D", "T", "C", "A", "N"].includes(code)) return "other";

    // Fallback for completed matches where only result_description is populated.
    if (desc.includes("chelmsford") && desc.includes("won")) return "win";
    if (desc.includes("won")) return "loss";
    if (desc.includes("draw") || desc.includes("tie") || desc.includes("cancel") || desc.includes("abandon") || desc.includes("no result")) return "other";

    return "other";
  }

  function getFormItems(source, currentMatch){
    if (!source) source = {};

    const possibleArrays = [
      source.form,
      source.formGuide,
      source.form_guide,
      source.matches,
      source.recentMatches,
      source.recent_matches,
      source.results,
      source.result_summary
    ];

    let items = [];
    for (const arr of possibleArrays){
      if (Array.isArray(arr) && arr.length){
        items = arr.slice();
        break;
      }
    }

    // If the JSON does not yet include history, use the current/latest match only.
    if (!items.length && currentMatch) items = [currentMatch];

    const areObjects = items.some(x => x && typeof x === "object" && !Array.isArray(x));

    if (areObjects){
      items = items
        .filter(isCompletedForForm)
        .sort((a,b) => {
          const bd = dateValueForMatch(b);
          const ad = dateValueForMatch(a);
          if (bd !== ad) return bd - ad;
          return (Number(b.id) || 0) - (Number(a.id) || 0);
        })
        .slice(0,5)
        .reverse(); // oldest to most recent
    } else {
      // Assume any simple W/L/D/T/C/A values are already oldest-to-newest;
      // keep the most recent five if more have been supplied.
      items = items.slice(-5);
    }

    while (items.length < 5) items.unshift(null);
    return items;
  }

  function renderFormGuide(teamId, source, currentMatch){
    const items = getFormItems(source, currentMatch);
    const dots = items.map(item => {
      const cls = normaliseFormCode(item, teamId);
      const letter = cls === "win" ? "W" : (cls === "loss" ? "L" : "");
      const label = cls === "win" ? "Win" : (cls === "loss" ? "Loss" : (cls === "other" ? "Drawn, tied, cancelled, abandoned or no result" : "No match"));
      return `<span class="form-dot ${cls}" title="${label}" aria-label="${label}">${letter}</span>`;
    }).join("");

    return `
      <div class="form-guide" aria-label="Recent form guide, oldest to most recent">
        <span class="form-label">Form Guide</span>
        <span class="form-dots">${dots}</span>
      </div>
    `;
  }

  // ========================
  // UI rendering
  // ========================
  function renderSkeletonCard(teamName){
    return `
      <div class="match">
        <div class="match-team-title">${escapeHtml(teamName)}</div>
        <div class="match-header other">
          <span class="status">Loading</span>
          <span class="summary"></span>
        </div>
        <div class="teams">
          <div class="skeleton"></div>
          <div style="height:10px"></div>
          <div class="skeleton" style="width:90%"></div>
        </div>
      </div>
    `;
  }

  function renderCard(team, match, perf, source){
    const formHtml = renderFormGuide(team.id, source, match);

    if (!match){
      return `
        <div class="match">
          <div class="match-team-title">${escapeHtml(team.name)}</div>
          <div class="match-header other">
            <span class="status">Awaiting</span>
            <span class="summary"></span>
          </div>
          <div class="teams">
            <div class="muted">${escapeHtml(team.name)} – No recent match</div>
          </div>
          <div class="match-footer">
            ${formHtml}
          </div>
        </div>
      `;
    }

    const state = statusLabel(match);
    const out = outcomeForChelmsford(match, team.id);
    const homeScore = scoreParts(match, match.home_team_id);
    const awayScore = scoreParts(match, match.away_team_id);

    // Identify which side is Chelmsford
    const chelIsHome = String(match.home_team_id) === String(team.id);

    // Chelmsford display name (strip club prefix home/away)
    const chelName = stripChelmsfordPrefix(
      safeText(chelIsHome ? match.home_team_name : match.away_team_name)
    );

    const oppName = chelIsHome
      ? `${safeText(match.away_club_name)} ${safeText(match.away_team_name)}`
      : `${safeText(match.home_club_name)} ${safeText(match.home_team_name)}`;

    const chelScore = chelIsHome ? homeScore : awayScore;
    const oppScore = chelIsHome ? awayScore : homeScore;

    const runs = (perf && perf.runs) ? perf.runs : [];
    const wickets = (perf && perf.wickets) ? perf.wickets : [];

    const runHtml = runs.map(r =>
      `<span class="perf-item">${escapeHtml(r.name)} ${r.score}${r.notOut ? '*' : ''}</span>`
    ).join('');

    const wickHtml = wickets.map(w =>
      `<span class="perf-item">${escapeHtml(w.name)} ${w.w}-${w.r}</span>`
    ).join('');

    return `
      <div class="match">
        <div class="match-team-title">${escapeHtml(team.name)}</div>

        <div class="match-header ${isLive(match) ? 'live' : out.cls}">
          <span class="status">${state}</span>
          <span class="summary">${isLive(match) ? "MATCH IN PROGRESS" : out.tag}</span>
        </div>

        <div class="teams">
          <div class="team chelmsford">
            <div class="team-name">${escapeHtml(chelName)}</div>
            <div class="scoreblock">
              <div class="score">${escapeHtml(chelScore.score)}</div>
              <div class="overs">${escapeHtml(chelScore.overs || "\u00A0")}</div>
            </div>
            <div class="perf-list">${runHtml}</div>
          </div>

          <div class="team opposition">
            <div class="team-name">${escapeHtml(oppName)}</div>
            <div class="scoreblock">
              <div class="score">${escapeHtml(oppScore.score)}</div>
              <div class="overs">${escapeHtml(oppScore.overs || "\u00A0")}</div>
            </div>
            <div class="perf-list">${wickHtml}</div>
          </div>

          <div class="meta">
            <span>${safeText(match.match_date)}</span>
            <span>${safeText(match.competition_name || "Friendly")}</span>
          </div>
        </div>

        <div class="match-footer">
          ${formHtml}
        </div>
      </div>
    `;
  }

  // ========================
  // REFRESH + CLOCK
  // ========================
  let countdown = REFRESH_SECONDS;
  let refreshTimer = null;
  let clockTimer = null;

  function startClock(){
    const clockEl = document.getElementById("clock");
    clockTimer = setInterval(() => {
      clockEl.textContent = nowLocalString();
    }, 1000);
    clockEl.textContent = nowLocalString();
  }

  function startCountdown(){
    const cdEl = document.getElementById("countdown");
    const lastEl = document.getElementById("lastRefreshed");

    if (refreshTimer) clearInterval(refreshTimer);

    refreshTimer = setInterval(async () => {
      countdown -= 1;
      if (countdown <= 0){
        cdEl.textContent = "0";
        await loadAndRender();
        lastEl.textContent = `Last refreshed: ${nowLocalString()}`;
        countdown = REFRESH_SECONDS;
      }
      cdEl.textContent = String(countdown);
    }, 1000);

    cdEl.textContent = String(countdown);
    lastEl.textContent = `Last refreshed: ${nowLocalString()}`;
  }

async function loadScoresData() {
  const res = await fetch(`${DATA_URL}?v=${Date.now()}`, {
    cache: "no-store"
  });

  if (!res.ok) {
    throw new Error(`Could not load ${DATA_URL}. HTTP status ${res.status}`);
  }

  return await res.json();
}

async function loadAndRender() {
  const grid = document.getElementById("grid");

  grid.innerHTML = TEAMS.map(t => renderSkeletonCard(t.name)).join("");

  try {
    const results = await loadScoresData();

    grid.innerHTML = results
      .map(x => renderCard(x.team, x.match, x.perf, x))
      .join("");

  } catch (e) {
    console.error(e);

    grid.innerHTML = TEAMS.map(t => `
      <div class="match">
        <div class="match-team-title">${escapeHtml(t.name)}</div>
        <div class="match-header other">
          <span class="status">Error</span>
          <span class="summary"></span>
        </div>
        <div class="teams">
          <div class="muted">${escapeHtml(t.name)} – Could not load scores JSON</div>
        </div>
      </div>
    `).join("");
  }
}
  // ========================
  // INIT
  // ========================
  (async function init(){
    // Ensure layout vars are correct before first render
    syncFixedLayoutHeights();

    await loadAndRender();

    // Re-sync once content/fonts have settled (important on TVs)
    setTimeout(syncFixedLayoutHeights, 50);

    startClock();
    startCountdown();
  })();
</script>
</body>
</html>
