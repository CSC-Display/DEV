<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<title>Chelmsford CC – This Week’s Results (2026)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root{
  --green:#1f6b3a;
  --green-dark:#16522c;
  --green-soft:#e3f2e7;

  --win:#1f6b3a;          /* dark green */
  --lost:#f3c6c6;         /* light red */
  --tied:#f6e0b4;         /* light orange */
  --other:#dff2e6;        /* light green */

  --bg:#f2f4f1;
  --card:#ffffff;
  --border:#d8ddd6;
  --muted:#7f887f;
  --ink:#1a1a1a;
}

*{box-sizing:border-box}

html {
  height: 100%;
}

body {
  height: 100vh;
  width: 100vw;
  margin: 0;
  overflow: hidden;   /* keep this */
  display: flex;
  flex-direction: column;
  font-family: "Segoe UI", system-ui, sans-serif;
  color: var(--ink);
  background: var(--bg);
}

header{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background:var(--green);
  color:white;
  padding:14px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  z-index: 10;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.brand img{
  width:56px;
  height:56px;
  object-fit:contain;
  background: rgba(255,255,255,.12);
  border-radius:12px;
  padding:6px;
}

header h1{
  margin:0;
  letter-spacing:4px;
  font-size:26px;
  line-height:1.05;
}

header .season{
  font-size:22px;
  opacity:.95;
  text-align:right;
  white-space:nowrap;
}

header .small{
  font-size:16px;
  color: white;
}

/* Main content (scrollable area) */

main {
  position: absolute;
  top: 90px;       /* height of header */
  bottom: 56px;    /* height of footer */
  left: 0;
  right: 0;
  padding: 12px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

@media (max-width:1400px){
  main{grid-template-columns: repeat(3,1fr);}
}
@media (max-width:900px){
  main{grid-template-columns: repeat(1,1fr);}
}

.match {
  border: 2px solid var(--border);
  border-radius: 14px;
  background: var(--card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.match-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  background: var(--other); /* default, overridden by result classes */
}

.match-header.win{ background: var(--win); color:#fff; }
.match-header.lost{ background: var(--lost); color:#391a1a; }
.match-header.tied{ background: var(--tied); color:#3a2a10; }
.match-header.other{ background: var(--other); color:#16331f; }

.status{
  background: rgba(0,0,0,.14);
  color: inherit;
  padding:4px 10px;
  border-radius:8px;
  font-size:13px;
  font-weight:700;
  letter-spacing:.4px;
}

.match-header.win .status{
  background: rgba(255,255,255,.22);
}

.summary{
  font-size:13px;
  font-weight:800;
  letter-spacing:.6px;
  text-transform:uppercase;
  opacity:.95;
}

.teams{
  padding:12px 14px;
}

.team {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

.team:first-child { border-top: none; }

.team-name { 
  font-weight: 650; 
  font-size: 14px; 
  flex: 1; 
  min-width: 0; /* Critical for text wrapping[cite: 5] */
  padding-right: 10px;
  line-height: 1.2;
}

.scoreblock{
  text-align:right;
  min-width: 128px;
  line-height:1.15;
  flex-shrink: 0;
}

.score{
  font-weight:500;          /* NOT bold */
  font-size:15px;
}

.overs{
  font-weight:500;
  font-size:12px;
  color: var(--muted);
  margin-top:3px;
}

/* Performance styling for runs and wickets */
/* Spans full width underneath the name and score[cite: 4, 5] */
.perf-list {
  width: 100%; 
  margin-top: 4px;
  font-size: 12px;
  color: #444;
  font-weight: 500;
}

.perf-item { 
  display: block; 
  line-height: 1.3; 
}

.meta{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:10px;
  padding-top:10px;
  border-top:1px dashed var(--border);
  color: var(--muted);
  font-size:12px;
}

.muted{
  color:var(--muted);
  font-weight:500;
}

/* Footer (fixed) */

.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:56px;
  background:#eef2ec;
  border-top:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  font-size:14px;
  color:#4a514a;
  z-index: 10;
}

.footer .left{
  display:flex;
  gap:10px;
  align-items:center;
}

.pill{
  background:white;
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
}

.small{
  font-size:16px;
  color: white;
}

.small_footer{
  font-size:12px;
  color: var(--muted);
}

/* simple loading shimmer */
.skeleton{
  background: linear-gradient(90deg, #f1f3f0, #e7ebe6, #f1f3f0);
  background-size: 200% 100%;
  animation: shimmer 1.1s infinite;
  border-radius: 10px;
  height: 14px;
  width: 70%;
}

@keyframes shimmer{
  0%{ background-position: 200% 0; }
  100%{ background-position: -200% 0; }
}

</style>
</head>

<body>

<header>
  <div class="brand">
    <!-- Club badge (public URL). You can replace with a local file if preferred. -->
    <img
      src="https://img-res.pitchero.com/?url=images.pitchero.com%2Fclub_logos%2F78190%2FV4VHWNHTvWksHRqonMJ9_Website%20logo%20no%20bg2.png&bg=null&h=180&w=180&t=square&q=null"
      alt="Chelmsford Cricket Club badge" />
    <div>
      <h1>THIS WEEK’S RESULTS</h1>
      <div class="small">Chelmsford Cricket Club</div>
    </div>
  </div>

  <h1>SEASON 2026</h1>
</header>

<main id="grid"></main>

<footer class="footer">
  <div class="left">
    <span class="pill">Refresh in <strong id="countdown">300</strong>s</span>
    <span class="small_footer" id="lastRefreshed">Last refreshed: —</span>
  </div>
  <div class="right">
    <span class="pill" id="clock">—</span>
  </div>
</footer>

<script>
// ========================
// CONFIG
// ========================
const SITE_ID = 1786;
const SEASON = "2026";
const API_TOKEN = "8786d7c44061b7d624367d32177420e0"; // <-- put your token here

// Chelmsford teams
const TEAMS = [
  { name:"Sat 1st XI", id:24293 },
  { name:"Sat 2nd XI", id:24294 },
  { name:"Sat 3rd XI", id:24295 },
  { name:"Sat 4th XI", id:30461 },
  { name:"Sat 5th XI", id:45348 },
  { name:"Sat 6th XI", id:105976 },
  { name:"NECL 1st XI", id:324716 },
  { name:"Sun 1st XI", id:30938 },
  { name:"Twenty20", id:133549 },
  { name:"Womens 1st XI", id:213007 }
];

const REFRESH_SECONDS = 300;

// ========================
// HELPERS (existing)
// ========================
function pad2(n){ return String(n).padStart(2, "0"); }

function nowLocalString(){
  const d = new Date();
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function parseDMY(dmy){
  const m = String(dmy||"").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return 0;
  const dd = +m[1], mm = +m[2], yyyy = +m[3];
  return new Date(yyyy, mm-1, dd).getTime();
}

function safeText(x){
  return (x === null || x === undefined || x === "") ? "—" : String(x);
}

// Remove a leading "Chelmsford CC" or "Chelmsford Cricket Club" prefix from a label (case-insensitive).
function stripChelmsfordPrefix(label){
 return String(label || "")
 .replace(/^\s*Chelmsford\s+(?:CC|Cricket\s+Club)\s*/i, "")
 .trim();
}


function pickList(json){
  return json?.result_summary || [];
}

function pickLatest(list){
  return (list || []).slice().sort((a,b) => {
    const ad = parseDMY(a.match_date) || parseDMY(a.last_updated) || 0;
    const bd = parseDMY(b.match_date) || parseDMY(b.last_updated) || 0;
    if (bd !== ad) return bd - ad;
    return (b.id||0) - (a.id||0);
  })[0] || null;
}

function isLive(match){
  const hasInningsRuns = (match.innings || []).some(i => i && i.runs !== "");
  const hasResult = (match.result_description && match.result_description !== "") || (match.result && match.result !== "");
  return hasInningsRuns && match.result_locked !== "true" && !hasResult;
}

function statusLabel(match){
  if (!match) return "Awaiting";
  if (isLive(match)) return "Live";
  const hasResult = (match.result_description && match.result_description !== "") || (match.result && match.result !== "");
  if (match.result_locked === "true" || hasResult) return "Result";
  return "Awaiting";
}

function outcomeForChelmsford(match, chelmsfordTeamId){
  if (!match) return { tag:"", cls:"other" };

  const code = match.result;
  const winner = String(match.result_applied_to || "");
  const chel = String(chelmsfordTeamId);

  if (code === "W" && winner){
    if (winner === chel) return { tag:"WON", cls:"win" };
    return { tag:"LOST", cls:"lost" };
  }
  if (code === "L") return { tag:"LOST", cls:"lost" };
  if (code === "T") return { tag:"TIED", cls:"tied" };
  if (code === "D") return { tag:"DRAWN", cls:"tied" };

  if (code === "C") return { tag:"CANCELLED", cls:"other" };
  if (code === "A") return { tag:"ABANDONED", cls:"other" };
  if (code === "N") return { tag:"NO RESULT", cls:"other" };

  const desc = (match.result_description || "").toLowerCase();
  if (desc.includes("won") && desc.includes("chelmsford")) return { tag:"WON", cls:"win" };
  if (desc.includes("won")) return { tag:"LOST", cls:"lost" };

  return { tag:"", cls:"other" };
}

function scoreParts(match, teamId){
  const inn = (match.innings || []).find(i => String(i.team_batting_id) === String(teamId));
  if (!inn || inn.runs === "" || inn.wickets === "") return { score:"—", overs:"" };
  const overs = inn.overs ? `${inn.overs} ov` : "";
  return { score: `${inn.runs}/${inn.wickets}`, overs };
}

// Simple HTML escape for inserted text
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[ch]));
}

// ========================
// UI rendering (existing + modified renderCard)
// ========================
function renderSkeletonCard(teamName){
  return `
    <div class="match">
      <div class="match-header other">
        <span class="status">Loading</span>
        <span class="summary"></span>
      </div>
      <div class="teams">
        <div class="skeleton"></div>
        <div style="height:10px"></div>
        <div class="skeleton" style="width:90%"></div>
      </div>
    </div>
  `;
}

function renderCard(team, match, perf){
  if (!match){
    return `
      <div class="match">
        <div class="match-header other">
          <span class="status">Awaiting</span>
          <span class="summary"></span>
        </div>
        <div class="teams">
          <div class="muted">${team.name} – No recent match</div>
        </div>
      </div>
    `;
  }

  const state = statusLabel(match);
  const out = outcomeForChelmsford(match, team.id);

  const homeScore = scoreParts(match, match.home_team_id);
  const awayScore = scoreParts(match, match.away_team_id);

  // Identify which side is Chelmsford for display placement:
  const chelIsHome = String(match.home_team_id) === String(team.id);

  // Chelmsford display name:
 // - Always drop the club prefix (e.g. "Chelmsford CC") and show only the team name,
 //   whether Chelmsford are HOME or AWAY.
 const chelName = stripChelmsfordPrefix(
   safeText(chelIsHome ? match.home_team_name : match.away_team_name)
 );

  const oppName = chelIsHome
    ? `${safeText(match.away_club_name)} ${safeText(match.away_team_name)}`
    : `${safeText(match.home_club_name)} ${safeText(match.home_team_name)}`;

  const chelScore = chelIsHome ? homeScore : awayScore;
  const oppScore  = chelIsHome ? awayScore : homeScore;

  // Ensure perf exists and default to empty arrays if data is missing
  const runs = (perf && perf.runs) ? perf.runs : [];
  const wickets = (perf && perf.wickets) ? perf.wickets : [];

  const runHtml = runs.map(r => 
    `<span class="perf-item">${escapeHtml(r.name)} ${r.score}${r.notOut ? '*' : ''}</span>`
  ).join('');

  const wickHtml = wickets.map(w => 
    `<span class="perf-item">${escapeHtml(w.name)} ${w.w}-${w.r}</span>`
  ).join('');

  return `
    <div class="match">
      <div class="match-header ${out.cls}">
        <span class="status">${state}</span>
        <span class="summary">${out.tag}</span>
      </div>

      <div class="teams">

        <!-- Chelmsford team (first) -->
        <div class="team">
          <div class="team-name">${escapeHtml(chelName)}</div>
          <div class="scoreblock">
            <div class="score">${escapeHtml(chelScore.score)}</div>
            <div class="overs">${escapeHtml(chelScore.overs || "\u00A0")}</div>
          </div>
          <div class="perf-list">${runHtml}</div>
        </div>

        <!-- Opponent team (second) -->
        <div class="team">
          <div class="team-name">${escapeHtml(oppName)}</div>
          <div class="scoreblock">
            <div class="score">${escapeHtml(oppScore.score)}</div>
            <div class="overs">${escapeHtml(oppScore.overs || "\u00A0")}</div>
          </div>
          <div class="perf-list">${wickHtml}</div>
        </div>

        <div class="meta">
          <span>${safeText(match.match_date)}</span>
	        <span>${safeText(match.competition_name || "Friendly")}</span>
        </div>
      </div>
    </div>
  `;
}

// ========================
// API call (existing)
// ========================
// Updated fetchMatchDetails with null-safety and ID matching
async function fetchMatchDetails(matchId) {
  const url = `https://play-cricket.com/api/v2/match_detail.json?match_id=${matchId}&api_token=${API_TOKEN}`;
  const perf = { runs: [], wickets: [] };
  
  try {
    const res = await fetch(url);
    const json = await res.json();
    const details = json.match_details[0];

    details.innings.forEach(inn => {
      // 1. Identify Chelmsford Batting (Innings 1 in your JSON)
      if (inn.team_batting_name.includes("Chelmsford")) {
         // Use 'bat' instead of 'batting'
         if (inn.bat) {
            inn.bat.forEach(b => {
              const r = parseInt(b.runs);
              if (!isNaN(r) && r >= 50) {
                // Use 'batsman_name'[cite: 3] and safety check for how_out
                const isNotOut = b.how_out && b.how_out.toLowerCase().includes("not out");
                perf.runs.push({ 
                  name: b.batsman_name, 
                  score: r, 
                  notOut: isNotOut 
                });
              }
            });
         }
      }

      // 2. Identify Chelmsford Bowling (Innings 2 in your JSON)
      if (!inn.team_batting_name.includes("Chelmsford")) {
        // Use 'bowl' instead of 'bowling'[cite: 3]
        if (inn.bowl) {
          inn.bowl.forEach(bw => {
            const w = parseInt(bw.wickets);
            if (!isNaN(w) && w >= 3) {
              // Use 'bowler_name'[cite: 3]
              perf.wickets.push({ name: bw.bowler_name, w: w, r: bw.runs });
            }
          });
        }
      }
    });
  } catch (e) { console.error("Detail fetch failed", e); }
  return perf;
}

async function fetchLatestForTeam(teamId){
  const url =
    `https://play-cricket.com/api/v2/result_summary.json` +
    `?site_id=${encodeURIComponent(SITE_ID)}` +
    `&season=${encodeURIComponent(SEASON)}` +
    `&team_id=${encodeURIComponent(teamId)}` +
    `&api_token=${encodeURIComponent(API_TOKEN)}`;

  const res = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!res.ok) return null;
  const json = await res.json();
  const list = pickList(json);
  return pickLatest(list);
}

// ========================
// REFRESH + CLOCK (existing)
// ========================
let countdown = REFRESH_SECONDS;
let refreshTimer = null;
let clockTimer = null;

function startClock(){
  const clockEl = document.getElementById("clock");
  clockTimer = setInterval(() => {
    clockEl.textContent = nowLocalString();
  }, 1000);
  clockEl.textContent = nowLocalString();
}

function startCountdown(){
  const cdEl = document.getElementById("countdown");
  const lastEl = document.getElementById("lastRefreshed");

  if (refreshTimer) clearInterval(refreshTimer);

  refreshTimer = setInterval(async () => {
    countdown -= 1;
    if (countdown <= 0){
      cdEl.textContent = "0";
      await loadAndRender();
      lastEl.textContent = `Last refreshed: ${nowLocalString()}`;
      countdown = REFRESH_SECONDS;
    }
    cdEl.textContent = String(countdown);
  }, 1000);

  cdEl.textContent = String(countdown);
  lastEl.textContent = `Last refreshed: ${nowLocalString()}`;
}

// Updated loadAndRender to pass the team ID through[cite: 3]
async function loadAndRender(){
  const grid = document.getElementById("grid");
  grid.innerHTML = TEAMS.map(t => renderSkeletonCard(t.name)).join("");

  const results = await Promise.all(TEAMS.map(async (t) => {
    const match = await fetchLatestForTeam(t.id);
    let perf = { runs: [], wickets: [] };
    
    // Pass t.id so the function knows exactly which team is Chelmsford[cite: 3]
    if (match && match.id) {
      perf = await fetchMatchDetails(match.id, t.id);
    }
    
    return { team: t, match, perf };
  }));

  grid.innerHTML = results.map(x => renderCard(x.team, x.match, x.perf)).join("");
}

// ========================
// INIT (existing)
// ========================
(async function init(){
  if (!API_TOKEN || API_TOKEN === "REPLACE_WITH_YOUR_API_TOKEN"){
    document.getElementById("grid").innerHTML =
      TEAMS.map(t => `
        <div class="match">
          <div class="match-header other">
            <span class="status">Awaiting</span>
            <span class="summary"></span>
          </div>
          <div class="teams">
            <div class="muted">${t.name} – Add API token in code</div>
          </div>
        </div>
      `).join("");
    startClock();
    startCountdown();
    return;
  }

  await loadAndRender();
  startClock();
  startCountdown();
})();
</script>

</body>
</html>
