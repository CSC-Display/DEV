<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #e8ebe8;
    overflow: hidden;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8ebe8;
  }

  /* 16:9 container that scales to fill viewport */
  .board {
    width: 100%;
    height: 100%;
    max-width: calc(100vh * 16 / 9);
    max-height: calc(100vw * 9 / 16);
    background: #f0f2f0;
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .hdr {
    flex: 0 0 auto;
    background: #1a6b34;
    border-bottom: 3px solid #145228;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3%;
    height: 12%;
  }

  .hdr-left {
    display: flex;
    align-items: center;
    gap: 2%;
  }

  .club-crest {
    overflow: hidden;
    flex-shrink: 0;
    width: clamp(32px, 5.5%, 62px);
    height: clamp(32px, 5.5%, 62px);


    display: flex;
    align-items: center;
    justify-content: center;
  }

  .club-crest img { width: 100%; height: 100%; object-fit: contain; }

  .hdr-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 3.6vw, 42px);
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }

  .hdr-right {
    display: flex;
    align-items: center;
    gap: 1.5%;
  }

  .live-dot {
    width: clamp(7px, 1%, 11px);
    height: clamp(7px, 1%, 11px);

    background: #a8f0c0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .hdr-season {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(11px, 1.6vw, 19px);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }

  /* ── MATCHES GRID ── */
  .matches {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 1.5% 2.5% 1%;
    gap: 1.5%;
    background: #e8ebe8;
  }

  .match-card {
    flex: 1;
    background: #ffffff;
    border-radius: 6px;
    border: 1px solid #d4d9d4;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .match-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .card-top {
    background: #f5f7f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3%;
    height: 28%;
    border-bottom: 1px solid #e0e4e0;
    flex-shrink: 0;
  }

  .division-pill {
    background: #1a6b34;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(8px, 1vw, 12px);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px 2px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 65%;
  }

  .match-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(9px, 1.1vw, 14px);
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #8a9a8a;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .team-row {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3%;
    border-bottom: 1px solid #edf0ed;
    position: relative;
  }

  .team-row:last-child {
    border-bottom: none;
  }

  .team-row.winner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #1a6b34;
    border-radius: 0 2px 2px 0;
  }

  .team-info {
    display: flex;
    align-items: center;
    gap: 2%;
    min-width: 0;
    flex: 1;
  }

  .team-shield {
    flex-shrink: 0;
    width: clamp(14px, 2.2%, 22px);
    height: clamp(14px, 2.2%, 22px);
    opacity: 0.35;
  }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(11px, 1.7vw, 20px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #5a6a5a;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
  }

  .team-row.winner .team-name {
    color: #1a3a24;
  }

  .score-wrap {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2%;
  }

  .score-box {
    background: #1a1a1a;
    border: 1px solid #111;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(12px, 1.9vw, 22px);
    font-weight: 800;
    letter-spacing: 0.04em;
    color: #fff;
    padding: 3px 14px;
    min-width: clamp(56px, 8%, 90px);
    text-align: center;
    line-height: 1.3;
  }

  .team-row.winner .score-box {
    background: #1a6b34;
    border-color: #145228;
    color: #fff;
  }

  .result-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(7px, 0.85vw, 10px);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #1a6b34;
    text-transform: uppercase;
    white-space: nowrap;
    min-width: clamp(30px, 5%, 55px);
    text-align: right;
  }

  /* ── FOOTER ── */
  .ftr {
    flex: 0 0 auto;
    height: 7%;
    background: #f5f7f5;
    border-top: 1px solid #d4d9d4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3%;
    overflow: hidden;
  }

  .ftr-left {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(8px, 1vw, 12px);
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #aab4aa;
    text-transform: uppercase;
  }

  .ftr-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(9px, 1.1vw, 13px);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #aab4aa;
    text-transform: uppercase;
  }

  /* ── STATES ── */
  .state-msg {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2%;
    padding: 3%;
  }

  .state-main {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px, 2.2vw, 26px);
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #8a9a8a;
    text-transform: uppercase;
  }

  .state-sub {
    font-family: 'Barlow', sans-serif;
    font-size: clamp(9px, 1.1vw, 13px);
    color: #aab4aa;
    text-align: center;
  }

  /* shield SVG inline */
  .shield-svg { display: inline-block; }
</style>
</head>
<body>
<div class="stage">
  <div class="board">

    <div class="hdr">
      <div class="hdr-left">
        <div class="club-crest">
          <img src="../images/Chelmsford CC Vector Logo.JPG" alt="Chelmsford CC" >
        </div>
        <span class="hdr-title">Recent Results</span>
      </div>
      <div class="hdr-right">
        <div class="live-dot"></div>
        <span class="hdr-season">Season 2024</span>
      </div>
    </div>

    <div class="matches" id="matches">
      <div class="state-msg">
        <div class="state-main">Loading…</div>
        <div class="state-sub">Fetching latest results</div>
      </div>
    </div>

    <div class="ftr">
      <span class="ftr-left">Play Cricket · Division 1</span>
      <span class="ftr-time" id="clock"></span>
    </div>

  </div>
</div>

<script>
const API_TOKEN = '8786d7c44061b7d624367d32177420e0';
const SITE_ID   = '1786';
const SEASON    = '2024';
const BASE      = 'https://play-cricket.com/api/v2';
const REFRESH_MS = 5 * 60 * 1000; // refresh every 5 minutes

// ── Clock ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }) +
    ' · ' +
    now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

// ── Shield SVG ─────────────────────────────────────────
function shieldSVG(color) {
  return `<svg class="team-shield" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 1L2 5v5c0 4.4 3 8.4 8 9.5C15 18.4 18 14.4 18 10V5L10 1z" fill="${color}"/>
  </svg>`;
}

// ── Helpers ────────────────────────────────────────────
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function fmtScore(inning) {
  if (!inning) return '—';
  const runs = inning.runs != null ? inning.runs : '—';
  if (runs === '—') return '—';
  const w = inning.wickets;
  if (w === undefined || w === null || w >= 10) return `${runs}`;
  return `${runs}/${w}`;
}

function detectWinner(match) {
  const res = (match.result || '').toLowerCase();
  if (!res || res === 'no result' || res.includes('draw') || res.includes('tie') || res.includes('abandon')) return null;
  const homeName = (match.home_club_name || '').toLowerCase();
  const awayName = (match.away_club_name || '').toLowerCase();
  // simple heuristic — check if home/away team words appear before "won"
  const wonIdx = res.indexOf('won');
  if (wonIdx === -1) return null;
  const before = res.substring(0, wonIdx);
  const homeWords = homeName.split(/\s+/).filter(w => w.length > 3);
  const awayWords = awayName.split(/\s+/).filter(w => w.length > 3);
  const homeMatch = homeWords.some(w => before.includes(w));
  const awayMatch = awayWords.some(w => before.includes(w));
  if (homeMatch && !awayMatch) return 'home';
  if (awayMatch && !homeMatch) return 'away';
  return null;
}

// ── API ────────────────────────────────────────────────
async function getMatches() {
  const url = `${BASE}/matches?site_id=${SITE_ID}&season=${SEASON}&api_token=${API_TOKEN}&per_page=20`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`API ${r.status}`);
  const d = await r.json();
  return (d.matches || [])
    .filter(m => m.status === 'Completed' || m.result)
    .sort((a, b) => new Date(b.match_date) - new Date(a.match_date))
    .slice(0, 4);
}

async function getDetail(id) {
  try {
    const r = await fetch(`${BASE}/match_detail?match_id=${id}&api_token=${API_TOKEN}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.match_detail || null;
  } catch { return null; }
}

// ── Render ─────────────────────────────────────────────
function buildCard(match, detail, idx) {
  const innings = detail?.innings || [];
  const homeInning = innings.find(i => String(i.team_batting_id) === String(match.home_team_id));
  const awayInning = innings.find(i => String(i.team_batting_id) === String(match.away_team_id));

  const homeScore = homeInning ? fmtScore(homeInning) : (match.home_team_score || '—');
  const awayScore = awayInning ? fmtScore(awayInning) : (match.away_team_score || '—');

  const winner = detectWinner(match);
  const homeWin = winner === 'home';
  const awayWin = winner === 'away';

  const resultTag = homeWin ? '<span class="result-label">Won</span>' :
                    awayWin ? '<span class="result-label">Won</span>' : '';
  const homeTag   = homeWin ? '<span class="result-label">Won</span>' : '<span class="result-label"></span>';
  const awayTag   = awayWin ? '<span class="result-label">Won</span>' : '<span class="result-label"></span>';

  const div = match.competition_name || 'League';

  return `<div class="match-card" id="card-${idx}" style="transition-delay:${idx * 80}ms">
    <div class="card-top">
      <span class="division-pill">${div}</span>
      <span class="match-date">${fmtDate(match.match_date)}</span>
    </div>
    <div class="team-row${homeWin ? ' winner' : ''}">
      <div class="team-info">
        ${shieldSVG(homeWin ? '#1a6b34' : '#b0bcb0')}
        <span class="team-name">${match.home_club_name || 'Home'} – ${match.home_team_name || ''}</span>
      </div>
      <div class="score-wrap">
        ${homeTag}
        <span class="score-box">${homeScore}</span>
      </div>
    </div>
    <div class="team-row${awayWin ? ' winner' : ''}">
      <div class="team-info">
        ${shieldSVG(awayWin ? '#1a6b34' : '#b0bcb0')}
        <span class="team-name">${match.away_club_name || 'Away'} – ${match.away_team_name || ''}</span>
      </div>
      <div class="score-wrap">
        ${awayTag}
        <span class="score-box">${awayScore}</span>
      </div>
    </div>
  </div>`;
}

function showError(msg, sub) {
  document.getElementById('matches').innerHTML = `
    <div class="state-msg">
      <div class="state-main">${msg}</div>
      <div class="state-sub">${sub}</div>
    </div>`;
}

async function load() {
  try {
    const matches = await getMatches();

    if (!matches.length) {
      showError('No Results Yet', 'Check back once the season is underway');
      return;
    }

    const details = await Promise.all(matches.map(m => getDetail(m.id)));

    let html = '';
    matches.forEach((m, i) => { html += buildCard(m, details[i], i); });
    document.getElementById('matches').innerHTML = html;

    // stagger fade-in
    matches.forEach((_, i) => {
      requestAnimationFrame(() => {
        setTimeout(() => {
          const el = document.getElementById(`card-${i}`);
          if (el) el.classList.add('visible');
        }, i * 100);
      });
    });

  } catch (err) {
    showError('Could Not Load Data', err.message);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
