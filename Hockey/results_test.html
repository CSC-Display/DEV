<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford Hockey Club – Latest Scores</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root{
  --green:#006b3f;
  --green-dark:#004f2f;
  --green-light:#e8f5ee;

  --ladies:#7b1fa2;
  --ladies-light:#f3e5f5;

  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#dbe2e8;

  --live:#d32f2f;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;

  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(
    135deg,
    var(--green-dark),
    var(--green)
  );

  color:white;
  padding:24px 18px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2rem;
}

header p{
  margin:8px 0 0;
  opacity:.9;
}

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.section-title{
  margin:
    30px 0
    14px;

  font-size:1.4rem;
  font-weight:700;

  display:flex;
  align-items:center;
  gap:10px;
}

.section-title.men{
  color:var(--green-dark);
}

.section-title.ladies{
  color:var(--ladies);
}

.grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit, minmax(290px,1fr));

  gap:16px;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;

  border:1px solid var(--border);

  box-shadow:
    0 2px 8px rgba(0,0,0,.05);

  transition:
    transform .18s ease,
    box-shadow .18s ease;
}

.card:hover{
  transform:translateY(-2px);

  box-shadow:
    0 5px 18px rgba(0,0,0,.08);
}

.card-header{
  padding:14px 16px;
  color:white;
  font-weight:700;
  font-size:1rem;
}

.card-header.men{
  background:var(--green);
}

.card-header.ladies{
  background:var(--ladies);
}

.card-body{
  padding:16px;
}

.fixture{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.teams{
  font-weight:600;
  line-height:1.4;
}

.meta{
  font-size:.92rem;
  color:var(--muted);
  margin-top:4px;
}

.score{
  text-align:right;
  min-width:72px;
}

.scoreline{
  font-size:1.6rem;
  font-weight:800;
}

.live{
  color:var(--live);
}

.status{
  margin-top:4px;
  font-size:.8rem;
  font-weight:700;
  letter-spacing:.04em;
}

.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

footer{
  text-align:center;
  color:var(--muted);
  font-size:.9rem;
  padding:30px 20px 40px;
}
</style>
</head>

<body>

<header>
  <h1>Chelmsford Hockey Club</h1>
  <p>Latest Scores & Fixtures</p>
</header>

<div class="wrapper">

  <div class="section-title men">
    Men’s Teams
  </div>

  <div class="grid" id="mens-grid"></div>

  <div class="section-title ladies">
    Ladies Teams
  </div>

  <div class="grid" id="ladies-grid"></div>

</div>

<footer>
  Data provided by England Hockey GMS
</footer>

<script>
/* =========================================
   TEAM CONFIGURATION
========================================= */

const MEN_TEAMS = [
  { name:"Men's 1st XI", id:"7f1e9f14-a8e7-41f8-adee-775ba06b4640" },
  { name:"Men's 2nd XI", id:"ddc92ea3-426d-48c6-b732-31053e3ccbeb" },
  { name:"Men's 3rd XI", id:"de71af7a-ce05-4580-8068-db017efdbb12" },
  { name:"Men's 4th XI", id:"47e1e6e9-120c-4185-ad68-be7b70b76eac" },
  { name:"Men's 5th XI", id:"f7caa8cd-13e9-41ec-8dec-dbb6a08150db" },
  { name:"Men's 6th XI", id:"0a427e96-f92d-4f3c-be6a-5f9963b7d448" },
  { name:"Men's 7th XI", id:"a078330a-7a2c-4b35-be42-3fbdc1154980" },
  { name:"Men's 8th XI", id:"a4021954-7f9a-4e57-9604-3897ccd80c0b" },
  { name:"Vets", id:"11cc043b-4c8a-4db8-b3dc-44bbc11377c5" },
  { name:"Evergreens", id:"793f5407-9721-4771-9b68-b48e65ce781b" }
];

const LADIES_TEAMS = [
  { name:"Ladies 1st XI", id:"3176f8e1-f036-4874-bfbd-6034c56b12ad" },
  { name:"Ladies 2nd XI", id:"5e8b2c21-b039-4f41-8611-565a3136948e" },
  { name:"Ladies 3rd XI", id:"98cbe9c6-8190-4e3a-bc09-c2417844d82b" },
  { name:"Ladies 4th XI", id:"06424d34-7918-4d24-bba4-b0608426dc56" },
  { name:"Ladies 5th XI", id:"09083ed3-cd42-4c8a-9cd1-0813729badb8" },
  { name:"Ladies 6th XI", id:"be69f6a2-a9fb-4adf-8716-48b2650645cf" },
  { name:"Ladies 7th XI", id:"56641dbe-ade5-44f3-8611-1a3ad3ed6e4d" }
];

/* =========================================
   GMS CARD RENDERING
========================================= */

function createGMSCard(teamName, teamId, type){

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="card-header ${type}">
      ${teamName}
    </div>

    <div class="card-body">

      <div
        class="gms-wrapper gms-ajax"
        data-method="api"
        data-show="results"
        data-team="${teamId}"
        data-whatson="180"
        data-sort_by="reverseDate"
        data-options="showList:yes">
      </div>

    </div>
  `;

  return card;
}

/* =========================================
   LOAD TEAMS
========================================= */

function loadTeams(){

  const mensGrid =
    document.getElementById("mens-grid");

  const ladiesGrid =
    document.getElementById("ladies-grid");

  mensGrid.innerHTML = "";
  ladiesGrid.innerHTML = "";

  for(const team of MEN_TEAMS){

    mensGrid.appendChild(
      createGMSCard(team.name, team.id, "men")
    );
  }

  for(const team of LADIES_TEAMS){

    ladiesGrid.appendChild(
      createGMSCard(team.name, team.id, "ladies")
    );
  }

  /*
    Re-trigger GMS parser
  */

  if(window.GMS_API){
    window.GMS_API.init();
  }
}

/* =========================================
   INITIAL LOAD
========================================= */

window.addEventListener("load", () => {
  loadTeams();
});

</script>

<script src="https://gmsfeed.co.uk/js/api.js"></script>

</body>
</html>
