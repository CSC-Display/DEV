<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chelmsford Hockey Club – Latest Scores</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root{
  --green:#006b3f;
  --green-dark:#004f2f;
  --green-light:#e8f5ee;

  --ladies:#7b1fa2;
  --ladies-light:#f3e5f5;

  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#dbe2e8;

  --live:#d32f2f;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;

  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(
    135deg,
    var(--green-dark),
    var(--green)
  );

  color:white;
  padding:24px 18px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2rem;
}

header p{
  margin:8px 0 0;
  opacity:.9;
}

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.section-title{
  margin:
    30px 0
    14px;

  font-size:1.4rem;
  font-weight:700;

  display:flex;
  align-items:center;
  gap:10px;
}

.section-title.men{
  color:var(--green-dark);
}

.section-title.ladies{
  color:var(--ladies);
}

.grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit, minmax(290px,1fr));

  gap:16px;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;

  border:1px solid var(--border);

  box-shadow:
    0 2px 8px rgba(0,0,0,.05);

  transition:
    transform .18s ease,
    box-shadow .18s ease;
}

.card:hover{
  transform:translateY(-2px);

  box-shadow:
    0 5px 18px rgba(0,0,0,.08);
}

.card-header{
  padding:14px 16px;
  color:white;
  font-weight:700;
  font-size:1rem;
}

.card-header.men{
  background:var(--green);
}

.card-header.ladies{
  background:var(--ladies);
}

.card-body{
  padding:16px;
}

.fixture{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.teams{
  font-weight:600;
  line-height:1.4;
}

.meta{
  font-size:.92rem;
  color:var(--muted);
  margin-top:4px;
}

.score{
  text-align:right;
  min-width:72px;
}

.scoreline{
  font-size:1.6rem;
  font-weight:800;
}

.live{
  color:var(--live);
}

.status{
  margin-top:4px;
  font-size:.8rem;
  font-weight:700;
  letter-spacing:.04em;
}

.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

footer{
  text-align:center;
  color:var(--muted);
  font-size:.9rem;
  padding:30px 20px 40px;
}
</style>
</head>

<body>

<header>
  <h1>Chelmsford Hockey Club</h1>
  <p>Latest Scores & Fixtures</p>
</header>

<div class="wrapper">

  <div class="section-title men">
    Men’s Teams
  </div>

  <div class="grid" id="mens-grid"></div>

  <div class="section-title ladies">
    Ladies Teams
  </div>

  <div class="grid" id="ladies-grid"></div>

</div>

<footer>
  Data provided by England Hockey GMS
</footer>

<script>
/* =========================================
   TEAM CONFIGURATION
========================================= */

const MEN_TEAMS = [
  { name:"Men's 1st XI", id:"MEN1" },
  { name:"Men's 2nd XI", id:"MEN2" },
  { name:"Men's 3rd XI", id:"MEN3" },
  { name:"Men's 4th XI", id:"MEN4" },
  { name:"Men's 5th XI", id:"MEN5" },
  { name:"Men's 6th XI", id:"MEN6" },
  { name:"Men's 7th XI", id:"MEN7" },
  { name:"Men's 8th XI", id:"MEN8" },
  { name:"Vets", id:"VETS" },
  { name:"Evergreens", id:"EVERGREENS" }
];

const LADIES_TEAMS = [
  { name:"Ladies 1st XI", id:"L1" },
  { name:"Ladies 2nd XI", id:"L2" },
  { name:"Ladies 3rd XI", id:"L3" },
  { name:"Ladies 4th XI", id:"L4" },
  { name:"Ladies 5th XI", id:"L5" },
  { name:"Ladies 6th XI", id:"L6" },
  { name:"Ladies 7th XI", id:"L7" }
];

/* =========================================
   API FETCH
========================================= */

async function fetchMatch(teamId){

  /*
    Replace this with your actual
    England Hockey GMS endpoint.
  */

  const url =
    `https://YOUR-GMS-ENDPOINT/team/${teamId}`;

  try{

    const response = await fetch(url);

    if(!response.ok){
      throw new Error("API error");
    }

    const data = await response.json();

    return data;

  }catch(err){

    console.error(teamId, err);

    return null;
  }
}

/* =========================================
   CARD RENDERING
========================================= */

function createCard(teamName, data, type){

  const card = document.createElement("div");
  card.className = "card";

  const isLive =
    data?.status?.toLowerCase() === "live";

  const scoreClass =
    isLive ? "scoreline live" : "scoreline";

  card.innerHTML = `
    <div class="card-header ${type}">
      ${teamName}
    </div>

    <div class="card-body">

      ${
        data ? `
          <div class="fixture">

            <div>

              <div class="teams">
                Chelmsford HC
                ${data.homeAway === "A" ? "@" : "vs"}
                ${data.opponent}
              </div>

              <div class="meta">
                ${data.competition || ""}
              </div>

              <div class="meta">
                ${data.startTime || ""}
              </div>

            </div>

            <div class="score">

              <div class="${scoreClass}">
                ${data.homeScore ?? "-"}
                -
                ${data.awayScore ?? "-"}
              </div>

              <div class="status">
                ${data.status || ""}
              </div>

            </div>

          </div>
        `
        :
        `
          <div class="loading">
            No fixture data available
          </div>
        `
      }

    </div>
  `;

  return card;
}

/* =========================================
   LOAD TEAMS
========================================= */

async function loadTeams(){

  const mensGrid =
    document.getElementById("mens-grid");

  const ladiesGrid =
    document.getElementById("ladies-grid");

  mensGrid.innerHTML = "";
  ladiesGrid.innerHTML = "";

  for(const team of MEN_TEAMS){

    const data =
      await fetchMatch(team.id);

    mensGrid.appendChild(
      createCard(team.name, data, "men")
    );
  }

  for(const team of LADIES_TEAMS){

    const data =
      await fetchMatch(team.id);

    ladiesGrid.appendChild(
      createCard(team.name, data, "ladies")
    );
  }
}

/* =========================================
   INITIAL LOAD
========================================= */

loadTeams();

/* =========================================
   AUTO REFRESH
========================================= */

setInterval(loadTeams, 60000);
</script>

</body>
</html>
